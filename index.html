<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Local Trading Journal (Multi-Account)</title>

    <!-- Browser tab icon -->
    <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">

    <!-- iOS "Add to Home Screen" icon + app-like behavior -->
    <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Journal">

    <!-- PWA manifest (used by Android / Chrome "Add to Home Screen") -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0b0f19">

    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vue/3.3.4/vue.global.prod.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- InstantDB: real-time sync backend, loaded via CDN (no build step needed) -->
    <script src="https://www.unpkg.com/@instantdb/core@latest/dist/standalone/index.umd.cjs"></script>
    <style>
        body { background-color: #0b0f19; color: #f3f4f6; font-family: sans-serif; }
        [v-cloak] { display: none !important; }

        /* Hide scrollbars everywhere (still scrollable, just no visible track/thumb).
           Makes the packaged Electron build look like a native desktop app instead
           of a webpage. Safe to keep for the browser/mobile version too. */
        html { scrollbar-width: none; -ms-overflow-style: none; }
        ::-webkit-scrollbar { width: 0; height: 0; display: none; }
        .bg-dark-panel { background-color: #111827; }
        .bg-dark-input { background-color: #1f2937; }
        
        .group:hover .group-hover\:flex {
            display: flex !important;
        }

        input[type="date"], input[type="month"] {
            color-scheme: dark; 
        }
        input[type="date"]::-webkit-calendar-picker-indicator,
        input[type="month"]::-webkit-calendar-picker-indicator {
            cursor: pointer;
            filter: invert(0.6) sepia(1) saturate(5) hue-rotate(200deg);
        }
        
        .mini-grid-cell {
            aspect-ratio: 1;
            font-size: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 1px;
        }
    </style>
</head>
<body>
    <div id="app" v-cloak class="p-4 w-full mx-auto space-y-6" style="max-width: 1600px;">

        <!-- Read-only shared view loading/error states (?share=TOKEN in the URL) -->
        <div v-if="isShareView && sharedLoading" class="flex items-center justify-center min-h-[60vh] text-gray-400 text-sm">
            正在加载分享内容...
        </div>

        <div v-else-if="isShareView && (sharedError || !sharedAccount)" class="flex items-center justify-center min-h-[60vh]">
            <div class="text-center text-sm text-gray-400 max-w-xs">
                <p class="text-base text-white font-medium mb-1">链接无效或已被取消分享</p>
                <p>{{ sharedError || '请向对方确认最新的分享链接。' }}</p>
            </div>
        </div>

        <div v-else-if="!isShareView && authLoading" class="flex items-center justify-center min-h-[60vh] text-gray-400 text-sm">
            正在连接...
        </div>

        <div v-else-if="!isShareView && !authUser" class="flex items-center justify-center min-h-[70vh]">
            <div class="w-full max-w-sm bg-dark-panel border border-gray-800 rounded-xl p-6 shadow-xl space-y-4">
                <div class="text-center">
                    <h1 class="text-xl font-bold text-white tracking-wide">TRADING JOURNAL</h1>
                    <p class="text-xs text-gray-400 mt-1">登录后即可在电脑 / 手机间自动同步数据</p>
                </div>

                <form v-if="!loginSentEmail" @submit.prevent="sendCode" class="space-y-3">
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">邮箱地址</label>
                        <input type="email" v-model="loginEmail" required placeholder="you@example.com"
                               class="w-full bg-dark-input border border-gray-700 rounded px-3 py-2 text-sm text-white placeholder-gray-600 focus:outline-none focus:border-indigo-500">
                    </div>
                    <button type="submit" :disabled="loginSending"
                            class="w-full bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 text-white text-sm font-medium py-2 rounded transition cursor-pointer">
                        {{ loginSending ? '发送中...' : '发送验证码' }}
                    </button>
                    <p v-if="loginError" class="text-xs text-red-400">{{ loginError }}</p>
                </form>

                <form v-else @submit.prevent="verifyCode" class="space-y-3">
                    <p class="text-xs text-gray-400">验证码已发送至 <span class="text-white font-medium">{{ loginSentEmail }}</span></p>
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">6 位验证码</label>
                        <input type="text" v-model="loginCode" required inputmode="numeric" placeholder="123456"
                               class="w-full bg-dark-input border border-gray-700 rounded px-3 py-2 text-sm text-white placeholder-gray-600 tracking-widest focus:outline-none focus:border-indigo-500">
                    </div>
                    <button type="submit" :disabled="loginSending"
                            class="w-full bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 text-white text-sm font-medium py-2 rounded transition cursor-pointer">
                        {{ loginSending ? '验证中...' : '登录' }}
                    </button>
                    <button type="button" @click="loginSentEmail=''; loginCode=''; loginError=null;"
                            class="w-full text-xs text-gray-500 hover:text-gray-300 cursor-pointer">
                        重新输入邮箱
                    </button>
                    <p v-if="loginError" class="text-xs text-red-400">{{ loginError }}</p>
                </form>
            </div>
        </div>

        <!-- Unified dashboard: same markup for the logged-in owner AND the read-only
             shared visitor. `readOnly` (true only in the shared view) toggles the few
             bits that differ: account/export/share/logout controls and the add-record
             form are hidden, and the history table drops its checkboxes/delete column. -->
        <template v-else>
        
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center border-b border-gray-800 pb-4 gap-4 px-2">
            <div>
                <h1 class="text-2xl font-bold text-white tracking-wide">{{ readOnly ? currentAccountName : 'TRADING JOURNAL' }}</h1>
                <p class="text-xs text-gray-400 mt-1 flex items-center gap-1.5">
                    <template v-if="readOnly">
                        <span class="w-1.5 h-1.5 rounded-full bg-indigo-400"></span>
                        🔒 只读分享视图 · 数据实时同步 · 无法编辑
                    </template>
                    <template v-else>
                        <span class="w-1.5 h-1.5 rounded-full" :class="connectionState === 'connected' ? 'bg-green-400' : (connectionState === 'errored' ? 'bg-red-500' : 'bg-yellow-400 animate-pulse')"></span>
                        <span v-if="connectionState === 'connected'">云端实时同步 • {{ authUser.email }}</span>
                        <span v-else-if="connectionState === 'errored'">连接失败 • 请检查 APP_ID 或网络</span>
                        <span v-else>正在连接同步服务...</span>
                    </template>
                </p>
            </div>
            
            <div v-if="!readOnly" class="flex flex-wrap items-center gap-3 bg-gray-900 bg-opacity-60 p-2 rounded-xl border border-gray-800">
                <div class="flex items-center gap-1.5">
                    <span class="text-xs text-gray-400 font-medium">当前账户:</span>
                    <select v-model="currentAccountId" @change="onAccountSwitch" 
                            class="bg-gray-800 border border-gray-700 rounded px-2.5 py-1 text-xs text-white font-bold tracking-wide focus:outline-none focus:border-indigo-500 cursor-pointer">
                        <option v-for="acc in accounts" :key="acc.id" :value="acc.id">{{ acc.name }}</option>
                    </select>
                </div>
                
                <div class="w-px h-4 bg-gray-700"></div>
                
                <div class="flex items-center gap-1.5">
                    <button @click="promptCreateAccount" class="px-2.5 py-1 bg-indigo-900 bg-opacity-40 hover:bg-indigo-900 text-indigo-300 border border-indigo-700/50 text-xs rounded transition cursor-pointer">
                        ＋ 新建账户
                    </button>
                    <button @click="deleteCurrentAccount" class="px-2.5 py-1 bg-red-950 bg-opacity-40 hover:bg-red-900 text-red-400 border border-red-900/40 text-xs rounded transition cursor-pointer" title="删除当前账户及其所有数据">
                        🗑️ 删除账户
                    </button>
                </div>

                <div class="w-px h-4 bg-gray-700"></div>

                <div class="flex gap-1.5">
                    <button @click="exportData" class="px-2.5 py-1 bg-gray-800 hover:bg-gray-700 text-[11px] rounded text-gray-300 transition cursor-pointer">导出备份</button>
                    <label class="px-2.5 py-1 bg-gray-800 hover:bg-gray-700 text-[11px] rounded text-gray-300 transition cursor-pointer">
                        导入备份 <input type="file" @change="importData" class="hidden">
                    </label>
                </div>

                <div class="w-px h-4 bg-gray-700"></div>

                <div class="relative group">
                    <button @click="shareLinkVisible = !shareLinkVisible" class="px-2.5 py-1 bg-indigo-900 bg-opacity-40 hover:bg-indigo-900 text-indigo-300 border border-indigo-700/50 text-xs rounded transition cursor-pointer">
                        🔗 只读分享{{ currentAccount && currentAccount.shareToken ? '（已开启）' : '' }}
                    </button>
                    <div v-if="shareLinkVisible" class="absolute z-50 top-full right-0 mt-2 w-72 bg-black text-gray-200 text-xs p-3 rounded-lg shadow-2xl border border-gray-800 space-y-2">
                        <p class="text-gray-400 leading-relaxed">生成一个只读链接，任何持有链接的人都可以查看当前账户「{{ currentAccountName }}」，但无法修改或删除数据。</p>
                        <div v-if="currentAccount && currentAccount.shareToken" class="space-y-2">
                            <input readonly :value="shareUrl" class="w-full bg-dark-input border border-gray-700 rounded px-2 py-1.5 text-[11px] text-gray-300" @click="$event.target.select()">
                            <div class="flex gap-1.5">
                                <button @click="copyShareLink" class="flex-1 px-2 py-1.5 bg-indigo-600 hover:bg-indigo-500 text-white rounded transition cursor-pointer">复制链接</button>
                                <button @click="revokeShare" :disabled="shareBusy" class="flex-1 px-2 py-1.5 bg-red-950 hover:bg-red-900 text-red-400 border border-red-900/40 rounded transition cursor-pointer disabled:opacity-50">取消分享</button>
                            </div>
                        </div>
                        <button v-else @click="shareCurrentAccount" :disabled="shareBusy" class="w-full px-2 py-1.5 bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 text-white rounded transition cursor-pointer">
                            {{ shareBusy ? '生成中...' : '生成只读链接' }}
                        </button>
                    </div>
                </div>

                <div class="w-px h-4 bg-gray-700"></div>

                <button @click="logout" class="px-2.5 py-1 bg-gray-800 hover:bg-gray-700 text-[11px] rounded text-gray-400 hover:text-gray-200 transition cursor-pointer">
                    退出登录
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 xl:grid-cols-4 gap-6">
            
            <div class="space-y-6 xl:col-span-1">
                <div v-if="!readOnly" class="bg-dark-panel border border-gray-800 rounded-xl p-5 shadow-xl">
                    <div class="flex bg-gray-800 p-1 rounded-lg mb-4">
                        <button type="button" @click="form.type = 'trade'" 
                                class="flex-1 text-xs py-1.5 rounded font-medium transition cursor-pointer"
                                :class="form.type === 'trade' ? 'bg-indigo-600 text-white shadow' : 'text-gray-400 hover:text-gray-200'">
                            📈 交易盈亏
                        </button>
                        <button type="button" @click="form.type = 'deposit'" 
                                class="flex-1 text-xs py-1.5 rounded font-medium transition cursor-pointer"
                                :class="form.type === 'deposit' ? 'bg-green-600 text-white shadow' : 'text-gray-400 hover:text-gray-200'">
                            💰 资金入金
                        </button>
                    </div>

                    <h2 class="text-sm font-semibold text-gray-400 mb-4 tracking-wider uppercase">
                        {{ form.type === 'trade' ? '记一笔交易' : '记录入金 (Deposit)' }}
                    </h2>
                    
                    <form @submit.prevent="addRecord" class="space-y-4">
                        <div>
                            <label class="block text-xs text-gray-400 mb-1">日期</label>
                            <input type="date" v-model="form.date" required 
                                   class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm text-white focus:outline-none focus:border-indigo-500 tracking-wide">
                            
                            <div class="flex gap-1.5 mt-2">
                                <button type="button" @click="setShortcutDate(0)" class="flex-1 bg-gray-800 hover:bg-gray-700 text-[11px] text-gray-300 py-1 rounded transition border border-gray-700/50 cursor-pointer">今天</button>
                                <button type="button" @click="setShortcutDate(1)" class="flex-1 bg-gray-800 hover:bg-gray-700 text-[11px] text-gray-300 py-1 rounded transition border border-gray-700/50 cursor-pointer">昨天</button>
                                <button type="button" @click="setLastFriday" class="flex-1 bg-gray-800 hover:bg-gray-700 text-[11px] text-gray-300 py-1 rounded transition border border-gray-700/50 cursor-pointer">上周五</button>
                            </div>
                        </div>

                        <template v-if="form.type === 'trade'">
                            <div>
                                <label class="block text-xs text-gray-400 mb-1">股票代码 (Ticker)</label>
                                <input type="text" v-model="form.ticker" placeholder="例如: AAPL, TSLA" class="w-full bg-dark-input border border-gray-700 rounded px-3 py-2 text-sm text-white placeholder-gray-600 uppercase focus:outline-none focus:border-indigo-500">
                            </div>
                            <div>
                                <label class="block text-xs text-gray-400 mb-1">净盈亏 (Net P&L)</label>
                                <input type="number" step="0.01" v-model.number="form.amount" required placeholder="正数盈利，负数亏损" class="w-full bg-dark-input border border-gray-700 rounded px-3 py-2 text-sm text-white focus:outline-none focus:border-indigo-500">
                            </div>
                        </template>

                        <template v-else>
                            <div>
                                <label class="block text-xs text-gray-400 mb-1">入金渠道 / 备注</label>
                                <input type="text" v-model="form.ticker" placeholder="例如: IBKR" class="w-full bg-dark-input border border-gray-700 rounded px-3 py-2 text-sm text-white placeholder-gray-600 uppercase focus:outline-none focus:border-green-500">
                            </div>
                            <div>
                                <label class="block text-xs text-gray-400 mb-1">入金金额 (Deposit Amount)</label>
                                <input type="number" step="0.01" v-model.number="form.amount" required placeholder="请输入入金的资金数额" class="w-full bg-dark-input border border-gray-700 rounded px-3 py-2 text-sm text-white focus:outline-none focus:border-green-500">
                            </div>
                        </template>

                        <button type="submit" class="w-full text-white font-medium text-sm py-2 rounded transition cursor-pointer" :class="form.type === 'trade' ? 'bg-indigo-600 hover:bg-indigo-500' : 'bg-green-600 hover:bg-green-500'">
                            保存记录
                        </button>
                    </form>
                </div>

                <div class="bg-dark-panel border border-gray-800 rounded-xl p-5 shadow-xl grid grid-cols-2 gap-4">
                    <div class="col-span-1 border-b border-gray-800 pb-2">
                        <span class="text-xs text-gray-400 tracking-wider uppercase block">总净盈亏 (P&L)</span>
                        <div class="text-xl font-bold mt-1" :class="stats.netPnL >= 0 ? 'text-green-400' : 'text-red-500'">
                            {{ formatCurrency(stats.netPnL) }}
                        </div>
                    </div>

                    <div class="col-span-1 border-b border-gray-800 pb-2 border-l border-gray-800 pl-3">
                        <span class="text-xs text-gray-400 tracking-wider uppercase block">总入金 (Deposits)</span>
                        <div class="text-xl font-bold mt-1 text-gray-100">
                            ${{ stats.totalDeposits.toFixed(2) }}
                        </div>
                    </div>
                    
                    <div class="relative group border-t border-gray-800/40 pt-2 col-span-2">
                        <div class="flex items-center gap-1 text-xs text-gray-400 cursor-help mb-1.5">
                            <span>Trade Win %</span>
                        </div>
                        <div class="grid grid-cols-4 gap-1 text-center">
                            <div><span class="block text-[9px] text-gray-500">全局</span><span class="text-xs font-semibold text-white">{{ stats.tradeWinPct }}%</span></div>
                            <div><span class="block text-[9px] text-gray-500">当天</span><span class="text-xs font-semibold text-indigo-400">{{ stats.dayWinPct }}%</span></div>
                            <div><span class="block text-[9px] text-gray-500">当周</span><span class="text-xs font-semibold text-indigo-400">{{ stats.weeklyWinPct }}%</span></div>
                            <div><span class="block text-[9px] text-gray-500">当月</span><span class="text-xs font-semibold text-indigo-400">{{ stats.monthlyWinPct }}%</span></div>
                        </div>
                    </div>

                    <div class="relative group border-t border-gray-800 pt-2 col-span-2">
                        <div class="flex items-center gap-1 text-xs text-gray-400 cursor-help mb-1.5">
                            <span>Profit Factor</span>
                            <span class="text-indigo-400 font-bold">ⓘ</span>
                        </div>
                        <div class="grid grid-cols-4 gap-1 text-center">
                            <div><span class="block text-[9px] text-gray-500">全局</span><span class="text-xs font-semibold text-white">{{ stats.profitFactor }}</span></div>
                            <div><span class="block text-[9px] text-gray-500">当天</span><span class="text-xs font-semibold text-indigo-400">{{ stats.dayProfitFactor }}</span></div>
                            <div><span class="block text-[9px] text-gray-500">当周</span><span class="text-xs font-semibold text-indigo-400">{{ stats.weeklyProfitFactor }}</span></div>
                            <div><span class="block text-[9px] text-gray-500">当月</span><span class="text-xs font-semibold text-indigo-400">{{ stats.monthlyProfitFactor }}</span></div>
                        </div>
                        <div class="hidden group-hover:flex absolute z-50 bottom-full left-0 mb-2 w-48 bg-black text-gray-200 text-[11px] p-2.5 rounded-lg shadow-2xl border border-gray-800 flex-col leading-relaxed">
                            <strong>获利因子</strong>
                            <span class="text-gray-400 mt-1">总赚取的资金除以总亏损的资金（不计算入金）。当天/当周/当月以交易表单里选择的日期为准。</span>
                        </div>
                    </div>

                    <div class="relative group border-t border-gray-800 pt-2 col-span-2">
                        <div class="flex items-center gap-1 text-xs text-gray-400 cursor-help mb-1.5">
                            <span>Avg Win / Loss</span>
                            <span class="text-indigo-400 font-bold">ⓘ</span>
                        </div>
                        <div class="grid grid-cols-4 gap-1 text-center">
                            <div>
                                <span class="block text-[9px] text-gray-500">全局</span>
                                <span class="block text-[10px] font-semibold text-green-400 leading-tight truncate">{{ formatCurrency(stats.avgWin) }}</span>
                                <span class="block text-[10px] font-semibold text-red-500 leading-tight truncate">{{ formatCurrency(stats.avgLoss) }}</span>
                            </div>
                            <div>
                                <span class="block text-[9px] text-gray-500">当天</span>
                                <span class="block text-[10px] font-semibold text-green-400 leading-tight truncate">{{ formatCurrency(stats.dayAvgWin) }}</span>
                                <span class="block text-[10px] font-semibold text-red-500 leading-tight truncate">{{ formatCurrency(stats.dayAvgLoss) }}</span>
                            </div>
                            <div>
                                <span class="block text-[9px] text-gray-500">当周</span>
                                <span class="block text-[10px] font-semibold text-green-400 leading-tight truncate">{{ formatCurrency(stats.weeklyAvgWin) }}</span>
                                <span class="block text-[10px] font-semibold text-red-500 leading-tight truncate">{{ formatCurrency(stats.weeklyAvgLoss) }}</span>
                            </div>
                            <div>
                                <span class="block text-[9px] text-gray-500">当月</span>
                                <span class="block text-[10px] font-semibold text-green-400 leading-tight truncate">{{ formatCurrency(stats.monthlyAvgWin) }}</span>
                                <span class="block text-[10px] font-semibold text-red-500 leading-tight truncate">{{ formatCurrency(stats.monthlyAvgLoss) }}</span>
                            </div>
                        </div>
                        <div class="hidden group-hover:flex absolute z-50 bottom-full right-0 mb-2 w-48 bg-black text-gray-200 text-[11px] p-2.5 rounded-lg shadow-2xl border border-gray-800 flex-col leading-relaxed">
                            <strong>平均单笔盈/亏</strong>
                            <span class="text-gray-400 mt-1">盈利单的平均获利数额 vs 亏损单的平均亏损值。</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="xl:col-span-3 space-y-6">
                <div class="bg-dark-panel border border-gray-800 rounded-xl p-5 shadow-xl">
                    <div class="flex flex-col sm:flex-row justify-between sm:items-start md:items-center gap-3 mb-4">
                        <div class="flex items-center gap-2">
                            <template v-if="viewMode === 'month'">
                                <button @click="prevMonth" class="p-1.5 bg-gray-800 hover:bg-gray-700 text-xs rounded px-2.5 transition cursor-pointer">◀</button>
                                <input type="month" v-model="selectedYearMonth" class="bg-gray-800 border border-gray-700 rounded px-2.5 py-1 text-xs text-white font-medium focus:outline-none cursor-pointer focus:border-indigo-500 text-center tracking-wide">
                                <button @click="nextMonth" class="p-1.5 bg-gray-800 hover:bg-gray-700 text-xs rounded px-2.5 transition cursor-pointer">▶</button>
                            </template>
                            <template v-else>
                                <button @click="currentYear--" class="p-1.5 bg-gray-800 hover:bg-gray-700 text-xs rounded px-2.5 transition cursor-pointer">◀</button>
                                <span class="bg-gray-800 border border-gray-700 rounded px-4 py-1 text-xs text-white font-bold tracking-wider">{{ currentYear }} 年</span>
                                <button @click="currentYear++" class="p-1.5 bg-gray-800 hover:bg-gray-700 text-xs rounded px-2.5 transition cursor-pointer">▶</button>
                            </template>
                            <button @click="toggleViewMode" class="ml-2 px-3 py-1 bg-indigo-900 bg-opacity-40 text-indigo-300 hover:bg-indigo-900 border border-indigo-700/50 text-xs rounded transition cursor-pointer">
                                {{ viewMode === 'month' ? '📅 切换年视图' : '🗓️ 返回月视图' }}
                            </button>
                        </div>
                        <div v-if="viewMode === 'month'" class="text-xs text-gray-400 flex items-center gap-4 bg-gray-900 bg-opacity-40 px-3 py-1.5 rounded-lg border border-gray-800/60">
                            <div>Monthly stats: <span class="font-bold ml-1" :class="monthlySummary.pnl >= 0 ? 'text-green-400' : 'text-red-400'">{{ monthlySummary.pnl >= 0 ? '+' : '' }}{{ monthlySummary.pnl.toFixed(2) }}</span></div>
                            <div class="w-px h-3 bg-gray-800"></div>

                    <div v-for="d in selectedDayDetail.deposits" :key="d.id" class="flex justify-between items-center bg-green-950 bg-opacity-20 rounded px-3 py-2 text-xs">
                        <span class="font-mono text-gray-300 uppercase">{{ d.ticker || '-' }}</span>

    <script>
        const { createApp, ref, computed, onMounted, watch, nextTick } = Vue;

        // ---------------------------------------------------------------
        // InstantDB setup
        // Visit https://instantdb.com/dash to create a free app and get an APP_ID.
        // Paste that APP_ID below. That's the only setup step required —
        // no server, no schema push needed to get started.
        // ---------------------------------------------------------------
        const APP_ID = 'c39b06a1-34be-46b6-9d7e-f306be9b7682';
        const { init, id: instantId } = instant;
        const db = init({ appId: APP_ID });

        createApp({
            setup() {
                const isLoading = ref(true);
                const dbErrorMsg = ref(null);
                const connectionState = ref('connecting');

                // --- Auth state (magic-code email login) ---
                const authLoading = ref(true);
                const authUser = ref(null);
                const authError = ref(null);
                const loginEmail = ref('');
                const loginSentEmail = ref('');
                const loginCode = ref('');
                const loginError = ref(null);
                const loginSending = ref(false);

                // Local-only device preference: which account is selected on THIS device.
                // Accounts and records themselves live in InstantDB and sync everywhere.
                const currentAccountId = ref(localStorage.getItem('trading_journal_current_account_id') || null);

                const accounts = ref([]);      // [{ id, name, ownerId, createdAt }]
                const allRecords = ref([]);    // [{ id, type, date, ticker, amount, accountId, ownerId, createdAt }]
                let defaultAccountCreationAttempted = false;
                let unsubscribeDataQuery = null;

                db.subscribeConnectionStatus((status) => {
                    const map = { connecting: 'connecting', opened: 'connecting', authenticated: 'connected', closed: 'closed', errored: 'errored' };
                    connectionState.value = map[status] || 'connecting';
                });

                const startDataSubscription = () => {
                    if (unsubscribeDataQuery) { unsubscribeDataQuery(); }
                    unsubscribeDataQuery = db.subscribeQuery({ accounts: {}, records: {} }, (resp) => {
                        isLoading.value = false;
                        if (resp.error) {
                            dbErrorMsg.value = resp.error.message;
                            return;
                        }
                        dbErrorMsg.value = null;
                        accounts.value = (resp.data.accounts || []).slice().sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0));
                        allRecords.value = resp.data.records || [];

                        if (accounts.value.length === 0) {
                            // First run for this user: create a default account automatically.
                            if (!defaultAccountCreationAttempted) {
                                defaultAccountCreationAttempted = true;
                                const newId = instantId();
                                db.transact(db.tx.accounts[newId].update({ name: '默认账户', ownerId: authUser.value.id, createdAt: Date.now() }));
                            }
                        } else if (!currentAccountId.value || !accounts.value.find(a => a.id === currentAccountId.value)) {
                            currentAccountId.value = accounts.value[0].id;
                        }

                        nextTick(() => updateCharts());
                    });
                };

                db.subscribeAuth((auth) => {
                    authLoading.value = auth.isLoading;
                    authUser.value = auth.user || null;
                    authError.value = auth.error ? auth.error.message : null;

                    if (auth.user) {
                        defaultAccountCreationAttempted = false;
                        startDataSubscription();
                    } else if (unsubscribeDataQuery) {
                        unsubscribeDataQuery();
                        unsubscribeDataQuery = null;
                        accounts.value = [];
                        allRecords.value = [];
                        isLoading.value = true;
                    }
                });

                // --- Read-only sharing ("?share=TOKEN" in the URL) ---
                // Anyone with this link can view the account, but NOT edit it. See the
                // permission rules note near the bottom of this file / in the chat for
                // the InstantDB dashboard config this depends on.
                const urlShareToken = new URLSearchParams(window.location.search).get('share');
                const isShareView = ref(!!urlShareToken);
                const sharedLoading = ref(true);
                const sharedError = ref(null);
                const sharedAccount = ref(null);
                const sharedRecords = ref([]);

                if (urlShareToken) {
                    db.subscribeQuery(
                        {
                            accounts: { $: { where: { shareToken: urlShareToken } } },
                            records: { $: { where: { shareToken: urlShareToken } } },
                        },
                        (resp) => {
                            sharedLoading.value = false;
                            if (resp.error) { sharedError.value = resp.error.message; return; }
                            sharedAccount.value = (resp.data.accounts && resp.data.accounts[0]) || null;
                            sharedRecords.value = (resp.data.records || []).slice().sort((a, b) => {
                                if (a.date !== b.date) return a.date < b.date ? 1 : -1;
                                return (b.createdAt || 0) - (a.createdAt || 0);
                            });
                        },
                        { ruleParams: { shareToken: urlShareToken } }
                    );
                }


                const sendCode = async () => {
                    if (!loginEmail.value) return;
                    loginSending.value = true; loginError.value = null;
                    try {
                        await db.auth.sendMagicCode({ email: loginEmail.value });
                        loginSentEmail.value = loginEmail.value;
                    } catch (err) {
                        loginError.value = (err && err.body && err.body.message) || '发送失败，请检查邮箱地址';
                    } finally {
                        loginSending.value = false;
                    }
                };

                const verifyCode = async () => {
                    if (!loginCode.value) return;
                    loginSending.value = true; loginError.value = null;
                    try {
                        await db.auth.signInWithMagicCode({ email: loginSentEmail.value, code: loginCode.value });
                        loginEmail.value = ''; loginCode.value = ''; loginSentEmail.value = '';
                    } catch (err) {
                        loginError.value = (err && err.body && err.body.message) || '验证码错误，请重试';
                    } finally {
                        loginSending.value = false;
                    }
                };

                const logout = () => { db.auth.signOut(); };

                // "records" mirrors the original app's shape: the flat array of records
                // belonging to the currently selected account. Everything below this
                // point (stats, calendar, charts) reads from `records.value` exactly
                // like the original localStorage version did.
                // Unified data source: in the normal app this is the current account's
                // records; in the read-only shared view (?share=TOKEN) it's the publicly
                // queried records for the shared account. Every stat/calendar/chart below
                // reads from this one computed, so the shared view automatically renders
                // an identical dashboard without duplicating any of that logic.
                const records = computed(() => {
                    if (isShareView.value) return sharedRecords.value;
                    return allRecords.value.filter(r => r.accountId === currentAccountId.value);
                });

                const readOnly = computed(() => isShareView.value);

                const currentAccount = computed(() => {
                    if (isShareView.value) return sharedAccount.value;
                    return accounts.value.find(a => a.id === currentAccountId.value) || null;
                });
                const shareUrl = computed(() => {
                    if (!currentAccount.value || !currentAccount.value.shareToken) return '';
                    return `${window.location.origin}${window.location.pathname}?share=${currentAccount.value.shareToken}`;
                });

                const shareBusy = ref(false);
                const shareLinkVisible = ref(false);

                const generateShareToken = () => 'sh_' + Math.random().toString(36).slice(2) + Date.now().toString(36);

                // Turns on (or refreshes) the read-only link for the current account.
                // The token is stamped onto the account AND onto every one of its records,
                // because the InstantDB permission rules check `data.shareToken` directly
                // on each record (no schema links required — see the rules snippet).
                const shareCurrentAccount = async () => {
                    const acc = currentAccount.value;
                    if (!acc) return;
                    shareBusy.value = true;
                    try {
                        const token = acc.shareToken || generateShareToken();
                        const txs = [db.tx.accounts[acc.id].update({ shareToken: token })];
                        allRecords.value.filter(r => r.accountId === acc.id).forEach(r => {
                            txs.push(db.tx.records[r.id].update({ shareToken: token }));
                        });
                        await db.transact(txs);
                        shareLinkVisible.value = true;
                    } finally {
                        shareBusy.value = false;
                    }
                };

                const revokeShare = async () => {
                    const acc = currentAccount.value;
                    if (!acc || !acc.shareToken) return;
                    if (!confirm('确定要取消分享吗？之前发出的只读链接将立即失效。')) return;
                    shareBusy.value = true;
                    try {
                        const txs = [db.tx.accounts[acc.id].update({ shareToken: null })];
                        allRecords.value.filter(r => r.accountId === acc.id).forEach(r => {
                            txs.push(db.tx.records[r.id].update({ shareToken: null }));
                        });
                        await db.transact(txs);
                    } finally {
                        shareBusy.value = false;
                    }
                };

                const copyShareLink = async () => {
                    if (!shareUrl.value) return;
                    try {
                        await navigator.clipboard.writeText(shareUrl.value);
                        alert('只读链接已复制！对方打开后可查看，但无法修改。');
                    } catch (e) {
                        prompt('复制失败，请手动复制以下链接：', shareUrl.value);
                    }
                };

                // Format a Date using its LOCAL calendar date (not UTC). Using
                // .toISOString() here would shift the date near midnight for any
                // timezone behind UTC (e.g. it could show "tomorrow" in the evening).
                const toLocalDateStr = (d) => {
                    const y = d.getFullYear();
                    const m = String(d.getMonth() + 1).padStart(2, '0');
                    const day = String(d.getDate()).padStart(2, '0');
                    return `${y}-${m}-${day}`;
                };

                const form = ref({ type: 'trade', date: toLocalDateStr(new Date()), ticker: '', amount: null });
                const viewMode = ref('month');
                const tableTab = ref('trade'); 
                const searchQuery = ref('');

                const sortKey = ref('seq'); 
                const sortOrder = ref('desc');     

                const initDate = new Date();
                const selectedYearMonth = ref(`${initDate.getFullYear()}-${String(initDate.getMonth() + 1).padStart(2, '0')}`);
                const currentYear = ref(initDate.getFullYear());
                const currentMonth = computed(() => parseInt(selectedYearMonth.value.split('-')[1]) - 1);

                watch(selectedYearMonth, (newVal) => { if (newVal) { currentYear.value = parseInt(newVal.split('-')[0]); } });
                watch([tableTab, searchQuery], () => { currentPage.value = 1; });

                const currentPage = ref(1);
                const pageSize = 10;
                const selectedIds = ref([]);

                let dailyBarChart = null;
                let cumLineChart = null;
                let depositBarChart = null;

                // Whenever the current account's records change (from any device), refresh charts.
                watch(records, () => {
                    selectedIds.value = [];
                    nextTick(() => updateCharts());
                });

                // Reset UI state whenever the selected account changes, and remember the
                // choice locally (this is a per-device preference, not synced data).
                watch(currentAccountId, (newVal) => {
                    if (newVal) localStorage.setItem('trading_journal_current_account_id', newVal);
                    searchQuery.value = '';
                    currentPage.value = 1;
                    selectedIds.value = [];
                    nextTick(() => updateCharts());
                });

                // 核心多账户控制逻辑 (writes go to InstantDB and sync to every device)
                const promptCreateAccount = () => {
                    const name = prompt("请输入新账户的名称 (例如: 账户B, 美股期权账户):");
                    if (!name || name.trim() === "") return;
                    const cleanedName = name.trim();
                    if (accounts.value.some(a => a.name === cleanedName)) {
                        alert("该账户名称已存在！");
                        return;
                    }
                    const newId = instantId();
                    db.transact(db.tx.accounts[newId].update({ name: cleanedName, ownerId: authUser.value.id, createdAt: Date.now() }));
                    currentAccountId.value = newId;
                };

                const onAccountSwitch = () => { /* currentAccountId already updated via v-model; watcher above handles the rest */ };

                const deleteCurrentAccount = () => {
                    if (accounts.value.length <= 1) {
                        alert("系统中必须保留至少一个账户，无法删除唯一的账户。");
                        return;
                    }
                    const acc = accounts.value.find(a => a.id === currentAccountId.value);
                    if (!acc) return;
                    if (confirm(`⚠️ 危险操作！\n确定要彻底删除账户「${acc.name}」及其内部所有的交易与入金数据吗？此操作不可逆！`)) {
                        const txs = allRecords.value
                            .filter(r => r.accountId === currentAccountId.value)
                            .map(r => db.tx.records[r.id].delete());
                        txs.push(db.tx.accounts[currentAccountId.value].delete());
                        db.transact(txs);

                        const remaining = accounts.value.filter(a => a.id !== currentAccountId.value);
                        currentAccountId.value = remaining.length ? remaining[0].id : null;
                    }
                };

                // Stable display numbering for the current account's records, independent
                // of table sort order (chronological by date, then by creation time).
                const recordSeqMap = computed(() => {
                    const sorted = [...records.value].sort((a, b) => {
                        if (a.date !== b.date) return a.date < b.date ? -1 : 1;
                        return (a.createdAt || 0) - (b.createdAt || 0);
                    });
                    const map = {};
                    sorted.forEach((r, idx) => { map[r.id] = idx + 1; });
                    return map;
                });

                const filterRecords = (type) => {
                    return records.value.filter(r => r.type === type).map(r => ({ ...r, seq: recordSeqMap.value[r.id] }));
                };

                const toggleSort = (key) => {
                    if (sortKey.value === key) {
                        sortOrder.value = sortOrder.value === 'asc' ? 'desc' : 'asc';
                    } else {
                        sortKey.value = key;
                        sortOrder.value = 'desc'; 
                    }
                };

                const renderSortIcon = (key) => {
                    if (sortKey.value !== key) return '↕';
                    return sortOrder.value === 'asc' ? '▲' : '▼';
                };

                const processedRecords = computed(() => {
                    let items = filterRecords(tableTab.value);
                    const q = searchQuery.value.trim().toUpperCase();
                    if (q) {
                        items = items.filter(item => 
                            item.date.includes(q) || 
                            (item.ticker && item.ticker.toUpperCase().includes(q))
                        );
                    }
                    items.sort((a, b) => {
                        let valA = a[sortKey.value];
                        let valB = b[sortKey.value];
                        if (typeof valA === 'string') {
                            return sortOrder.value === 'asc' ? valA.localeCompare(valB) : valB.localeCompare(valA);
                        } else {
                            return sortOrder.value === 'asc' ? valA - valB : valB - valA;
                        }
                    });
                    return items;
                });

                const addRecord = () => {
                    if (form.value.amount === null || !currentAccountId.value) return;
                    db.transact(
                        db.tx.records[instantId()].update({
                            type: form.value.type,
                            date: form.value.date,
                            ticker: form.value.ticker.trim().toUpperCase() || (form.value.type === 'deposit' ? 'IBKR' : '-'),
                            amount: parseFloat(form.value.amount),
                            accountId: currentAccountId.value,
                            ownerId: authUser.value.id,
                            createdAt: Date.now(),
                            shareToken: (currentAccount.value && currentAccount.value.shareToken) || null,
                        })
                    );
                    form.value.amount = null;
                    form.value.ticker = '';
                };

                const setShortcutDate = (daysAgo) => {
                    const d = new Date();
                    d.setDate(d.getDate() - daysAgo);
                    form.value.date = toLocalDateStr(d);
                };

                const setLastFriday = () => {
                    const d = new Date();
                    const dayOfWeek = d.getDay(); 
                    let diff = dayOfWeek === 6 ? 1 : (dayOfWeek === 0 ? 2 : dayOfWeek + 2);
                    d.setDate(d.getDate() - diff);
                    form.value.date = toLocalDateStr(d);
                };

                const deleteSingle = (recordId) => {
                    if(confirm(`确定删除该条记录吗？`)) { db.transact(db.tx.records[recordId].delete()); }
                };

                const deleteSelected = () => {
                    if(confirm(`确定批量删除已选记录吗？`)) {
                        db.transact(selectedIds.value.map(rid => db.tx.records[rid].delete()));
                        selectedIds.value = [];
                    }
                };

                const totalPages = computed(() => Math.ceil(processedRecords.value.length / pageSize));
                const paginatedRecords = computed(() => {
                    const start = (currentPage.value - 1) * pageSize;
                    return processedRecords.value.slice(start, start + pageSize);
                });

                const isCurrentPageAllSelected = computed(() => {
                    const pageIds = paginatedRecords.value.map(r => r.id);
                    return pageIds.length > 0 && pageIds.every(rid => selectedIds.value.includes(rid));
                });

                const toggleSelectAllPage = (e) => {
                    const pageIds = paginatedRecords.value.map(r => r.id);
                    if (e.target.checked) { selectedIds.value = Array.from(new Set([...selectedIds.value, ...pageIds])); }
                    else { selectedIds.value = selectedIds.value.filter(rid => !pageIds.includes(rid)); }
                };

                const formatCurrency = (val) => {
                    if (val === 0) return '0.00';
                    return (val > 0 ? '+' : '') + val.toFixed(2);
                };

                // Shared helper: given a list of trade records, compute win%, profit factor,
                // and avg win/loss for that slice. Used for global/day/week/month breakdowns.
                const computeTradeStats = (tList) => {
                    const totalTrades = tList.length;
                    const winningTrades = tList.filter(t => t.amount > 0).length;
                    const winPct = totalTrades ? ((winningTrades / totalTrades) * 100).toFixed(1) : '0.0';

                    const grossProfit = tList.filter(t => t.amount > 0).reduce((acc, t) => acc + t.amount, 0);
                    const grossLoss = Math.abs(tList.filter(t => t.amount < 0).reduce((acc, t) => acc + t.amount, 0));
                    const profitFactor = grossLoss === 0 ? (grossProfit ? 'inf' : '0.00') : (grossProfit / grossLoss).toFixed(2);

                    const winTrades = tList.filter(t => t.amount > 0);
                    const lossTrades = tList.filter(t => t.amount < 0);
                    const avgWin = winTrades.length ? (winTrades.reduce((acc, t) => acc + t.amount, 0) / winTrades.length) : 0;
                    const avgLoss = lossTrades.length ? (lossTrades.reduce((acc, t) => acc + t.amount, 0) / lossTrades.length) : 0;

                    return { count: totalTrades, winPct, profitFactor, avgWin, avgLoss };
                };

                const stats = computed(() => {
                    const tList = records.value.filter(r => r.type === 'trade');
                    const dList = records.value.filter(r => r.type === 'deposit');
                    
                    const netPnL = tList.reduce((acc, t) => acc + t.amount, 0);
                    const totalDeposites = dList.reduce((acc, d) => acc + d.amount, 0);

                    // "Day/Week/Month" here follow the date currently selected in the entry
                    // form, same convention as the original Win% breakdown.
                    const targetDateStr = form.value.date;
                    const todayTrades = tList.filter(t => t.date === targetDateStr);

                    const targetDate = new Date(targetDateStr + 'T00:00:00');
                    const dayOfWeek = targetDate.getDay();
                    const startOfWeek = new Date(targetDate); startOfWeek.setDate(targetDate.getDate() - dayOfWeek);
                    const endOfWeek = new Date(targetDate); endOfWeek.setDate(targetDate.getDate() + (6 - dayOfWeek));
                    const startOfWeekStr = toLocalDateStr(startOfWeek);
                    const endOfWeekStr = toLocalDateStr(endOfWeek);
                    const weeklyTrades = tList.filter(t => t.date >= startOfWeekStr && t.date <= endOfWeekStr);

                    const targetYearMonth = targetDateStr.substring(0, 7);
                    const monthlyTrades = tList.filter(t => t.date.startsWith(targetYearMonth));

                    const global = computeTradeStats(tList);
                    const day = computeTradeStats(todayTrades);
                    const week = computeTradeStats(weeklyTrades);
                    const month = computeTradeStats(monthlyTrades);

                    return {
                        netPnL, totalDeposits: totalDeposites,
                        tradeWinPct: global.winPct, dayWinPct: day.winPct, weeklyWinPct: week.winPct, monthlyWinPct: month.winPct,
                        profitFactor: global.profitFactor, dayProfitFactor: day.profitFactor, weeklyProfitFactor: week.profitFactor, monthlyProfitFactor: month.profitFactor,
                        avgWin: global.avgWin, avgLoss: global.avgLoss,
                        dayAvgWin: day.avgWin, dayAvgLoss: day.avgLoss,
                        weeklyAvgWin: week.avgWin, weeklyAvgLoss: week.avgLoss,
                        monthlyAvgWin: month.avgWin, monthlyAvgLoss: month.avgLoss,
                        dayTradeCount: day.count, weeklyTradeCount: week.count, monthlyTradeCount: month.count, globalTradeCount: global.count,
                    };
                });

                const dailyMergedMap = computed(() => {
                    const map = {};
                    records.value.forEach(r => {
                        if (!map[r.date]) { map[r.date] = { pnl: 0, deposit: 0, hasTradeData: false, tickers: [], tradeCount: 0 }; }
                        if (r.type === 'trade') {
                            map[r.date].pnl += r.amount;
                            map[r.date].hasTradeData = true;
                            map[r.date].tradeCount += 1;
                            if (r.ticker && r.ticker !== '-') map[r.date].tickers.push(r.ticker);
                        } else if (r.type === 'deposit') {
                            map[r.date].deposit += r.amount;
                            if (r.ticker) map[r.date].tickers.push(r.ticker);
                        }
                    });
                    Object.keys(map).forEach(d => { map[d].tickers = Array.from(new Set(map[d].tickers)); });
                    return map;
                });

                const buildWeeksMatrix = (year, monthIdx) => {
                    const blanks = new Date(year, monthIdx, 1).getDay();
                    const daysInMonth = new Date(year, monthIdx + 1, 0).getDate();
                    const cells = [];
                    for (let b = 0; b < blanks; b++) cells.push({ isPlaceholder: true });
                    for (let d = 1; d <= daysInMonth; d++) {
                        const dateStr = `${year}-${String(monthIdx + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                        const dayData = dailyMergedMap.value[dateStr] || { pnl: 0, deposit: 0, hasTradeData: false, tickers: [], tradeCount: 0 };
                        cells.push({
                            isPlaceholder: false, dayNum: d, dateStr: dateStr, 
                            pnl: dayData.pnl, deposit: dayData.deposit, hasTradeData: dayData.hasTradeData, tickers: dayData.tickers, tradeCount: dayData.tradeCount
                        });
                    }
                    const matrix = [];
                    while (cells.length > 0) {
                        const weekDays = cells.splice(0, 7);
                        while (weekDays.length < 7) weekDays.push({ isPlaceholder: true });
                        let weeklyPnl = 0, weeklyTradeDays = 0, weeklyTradeCount = 0;
                        weekDays.forEach(day => {
                            if (!day.isPlaceholder && day.hasTradeData) {
                                weeklyPnl += day.pnl;
                                weeklyTradeDays++;
                                weeklyTradeCount += day.tradeCount;
                            }
                        });
                        matrix.push({ days: weekDays, stats: { pnl: weeklyPnl, tradeDays: weeklyTradeDays, tradeCount: weeklyTradeCount } });
                    }
                    return matrix;
                };

                const calendarWeeks = computed(() => buildWeeksMatrix(currentYear.value, currentMonth.value));
                const getYearViewWeeks = (monthNum) => buildWeeksMatrix(currentYear.value, monthNum - 1);

                const getYearViewMonthStats = (monthNum) => {
                    let pnl = 0, days = 0, trades = 0;
                    const prefix = `${currentYear.value}-${String(monthNum).padStart(2, '0')}`;
                    Object.keys(dailyMergedMap.value).forEach(d => {
                        if (d.startsWith(prefix) && dailyMergedMap.value[d].hasTradeData) {
                            pnl += dailyMergedMap.value[d].pnl;
                            days++;
                            trades += dailyMergedMap.value[d].tradeCount;
                        }
                    });
                    return { pnl, days, trades };
                };

                const monthlySummary = computed(() => getYearViewMonthStats(currentMonth.value + 1));
                const toggleViewMode = () => { viewMode.value = viewMode.value === 'month' ? 'year' : 'month'; };
                const drillDownToMonth = (monthNum) => {
                    selectedYearMonth.value = `${currentYear.value}-${String(monthNum).padStart(2, '0')}`;
                    viewMode.value = 'month';
                };

                // --- Day detail modal: click a calendar cell to see every trade that day ---
                const selectedDayDetail = ref(null); // { dateStr, trades: [...], deposits: [...] }

                const openDayDetail = (day) => {
                    if (!day || day.isPlaceholder) return;
                    const dayRecords = records.value.filter(r => r.date === day.dateStr);
                    selectedDayDetail.value = {
                        dateStr: day.dateStr,
                        trades: dayRecords.filter(r => r.type === 'trade'),
                        deposits: dayRecords.filter(r => r.type === 'deposit'),
                    };
                };
                const closeDayDetail = () => { selectedDayDetail.value = null; };
                const dayDetailPnl = (detail) => detail.trades.reduce((acc, t) => acc + t.amount, 0);

                const getCalendarDayBg = (day) => {
                    if (!day.hasTradeData) {
                        return day.deposit > 0 ? 'bg-green-950 bg-opacity-20 border-green-900/40 text-gray-400' : 'bg-gray-800 bg-opacity-10 text-gray-600 border-transparent';
                    }
                    if (day.pnl > 0) return 'bg-green-950 bg-opacity-40 border-green-800 border-opacity-60 text-white';
                    if (day.pnl < 0) return 'bg-red-950 bg-opacity-30 border-red-900 border-opacity-50 text-white';
                    return 'bg-gray-800 bg-opacity-50 border-gray-700 text-white';
                };

                const prevMonth = () => {
                    let y = currentYear.value; let m = currentMonth.value;
                    if (m === 0) { m = 12; y--; } selectedYearMonth.value = `${y}-${String(m).padStart(2, '0')}`;
                };
                const nextMonth = () => {
                    let y = currentYear.value; let m = currentMonth.value + 2;
                    if (m > 12) { m = 1; y++; } selectedYearMonth.value = `${y}-${String(m).padStart(2, '0')}`;
                };

                const initCharts = () => {
                    const barEl = document.getElementById('dailyBarChart');
                    const lineEl = document.getElementById('cumLineChart');
                    const depEl = document.getElementById('depositBarChart');
                    if (!barEl || !lineEl || !depEl) return; // canvases not mounted yet (e.g. not logged in)

                    // Destroy any previous instances (e.g. after logout/login) before recreating.
                    if (dailyBarChart) { dailyBarChart.destroy(); dailyBarChart = null; }
                    if (cumLineChart) { cumLineChart.destroy(); cumLineChart = null; }
                    if (depositBarChart) { depositBarChart.destroy(); depositBarChart = null; }

                    const ctxBar = barEl.getContext('2d');
                    dailyBarChart = new Chart(ctxBar, {
                        type: 'bar',
                        data: { labels: [], datasets: [{ data: [], backgroundColor: [] }] },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { grid: { display: false }, ticks: { color: '#9ca3af', font: { size: 10 } } }, y: { grid: { color: '#1f2937' }, ticks: { color: '#9ca3af', font: { size: 10 } } } } }
                    });

                    const ctxLine = lineEl.getContext('2d');
                    cumLineChart = new Chart(ctxLine, {
                        type: 'line',
                        data: { labels: [], datasets: [{ label: '交易累计盈亏', data: [], borderColor: '#6366f1', borderWidth: 2, tensor: 0.1, fill: false, pointRadius: 2 }] },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { grid: { display: false }, ticks: { color: '#9ca3af', font: { size: 10 } } }, y: { grid: { color: '#1f2937' }, ticks: { color: '#9ca3af', font: { size: 10 } } } } }
                    });

                    const ctxDep = depEl.getContext('2d');
                    depositBarChart = new Chart(ctxDep, {
                        type: 'bar',
                        data: { labels: [], datasets: [{ data: [], backgroundColor: '#10b981' }] },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { grid: { display: false }, ticks: { color: '#9ca3af', font: { size: 10 } } }, y: { grid: { color: '#1f2937' }, ticks: { color: '#9ca3af', font: { size: 10 } } } } }
                    });

                    setTimeout(() => { updateCharts(); }, 100);
                };

                const updateCharts = () => {
                    if (!dailyBarChart || !cumLineChart || !depositBarChart) return;
                    
                    const dayTradeMap = {};
                    const dayDepositMap = {};
                    
                    records.value.forEach(r => {
                        if (r.type === 'trade') dayTradeMap[r.date] = (dayTradeMap[r.date] || 0) + r.amount;
                        if (r.type === 'deposit') dayDepositMap[r.date] = (dayDepositMap[r.date] || 0) + r.amount;
                    });
                    
                    const tradeDatesOnly = Object.keys(dayTradeMap).sort((a,b) => new Date(a) - new Date(b));
                    const dailyBarValues = tradeDatesOnly.map(d => dayTradeMap[d]);
                    dailyBarChart.data.labels = tradeDatesOnly;
                    dailyBarChart.data.datasets[0].data = dailyBarValues;
                    dailyBarChart.data.datasets[0].backgroundColor = dailyBarValues.map(v => v > 0 ? '#10b981' : (v < 0 ? '#f43f5e' : '#9ca3af'));
                    dailyBarChart.update();

                    let cumPnlSum = 0;
                    const pnlLineValues = tradeDatesOnly.map(d => {
                        cumPnlSum += dayTradeMap[d];
                        return cumPnlSum;
                    });
                    cumLineChart.data.labels = tradeDatesOnly;
                    cumLineChart.data.datasets[0].data = pnlLineValues;
                    cumLineChart.update();

                    const depositDatesOnly = Object.keys(dayDepositMap).sort((a,b) => new Date(a) - new Date(b));
                    const dailyDepositValues = depositDatesOnly.map(d => dayDepositMap[d]);
                    depositBarChart.data.labels = depositDatesOnly;
                    depositBarChart.data.datasets[0].data = dailyDepositValues;
                    depositBarChart.update();
                };

                const currentAccountName = computed(() => (currentAccount.value ? currentAccount.value.name : ''));

                const exportData = () => {
                    // 备份仅包含当前账户名和其流水记录（不含内部数据库 id，方便跨库导入）
                    const backupPackage = {
                        accountName: currentAccountName.value,
                        records: records.value.map(r => ({ type: r.type, date: r.date, ticker: r.ticker, amount: r.amount }))
                    };
                    const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(backupPackage));
                    const downloadAnchor = document.createElement('a');
                    downloadAnchor.setAttribute("href", dataStr);
                    downloadAnchor.setAttribute("download", `journal_${currentAccountName.value}_backup_${toLocalDateStr(new Date())}.json`);
                    document.body.appendChild(downloadAnchor); downloadAnchor.click(); downloadAnchor.remove();
                };

                const importData = (event) => {
                    const file = event.target.files[0]; if (!file) return;
                    const reader = new FileReader();
                    reader.onload = async (e) => {
                        try {
                            const imported = JSON.parse(e.target.result);
                            let recordsToImport = [];
                            let importedAccountName = null;

                            // 兼容旧版本的单数组备份结构与全新的账户包结构
                            if (Array.isArray(imported)) {
                                recordsToImport = imported;
                            } else if (imported && Array.isArray(imported.records)) {
                                recordsToImport = imported.records;
                                importedAccountName = imported.accountName || null;
                            } else {
                                alert("读取文件失败，请检查文件格式是否正确。");
                                return;
                            }

                            let targetAccountId = currentAccountId.value;
                            let targetName = currentAccountName.value;

                            if (importedAccountName) {
                                const existing = accounts.value.find(a => a.name === importedAccountName);
                                if (existing) {
                                    targetAccountId = existing.id;
                                } else {
                                    const newId = instantId();
                                    await db.transact(db.tx.accounts[newId].update({ name: importedAccountName, ownerId: authUser.value.id, createdAt: Date.now() }));
                                    targetAccountId = newId;
                                }
                                targetName = importedAccountName;
                            }

                            const txs = recordsToImport.map(r => db.tx.records[instantId()].update({
                                type: r.type,
                                date: r.date,
                                ticker: r.ticker || '-',
                                amount: parseFloat(r.amount) || 0,
                                accountId: targetAccountId,
                                ownerId: authUser.value.id,
                                createdAt: Date.now(),
                            }));
                            if (txs.length) await db.transact(txs);

                            currentAccountId.value = targetAccountId;
                            alert(`导入成功！已导入 ${txs.length} 条记录至账户：${targetName}`);
                        } catch (err) {
                            console.error(err);
                            alert("读取文件失败，请检查文件格式是否正确。");
                        }
                    };
                    reader.readAsText(file);
                    event.target.value = '';
                };

                // Canvases only exist in the DOM once logged in (they're inside the v-else
                // block). Initialize charts once authUser becomes truthy, and re-init if the
                // user logs out then back in (canvases get unmounted/remounted by Vue).
                watch(authUser, (newVal) => {
                    if (newVal) nextTick(() => initCharts());
                });
                watch(sharedAccount, (newVal) => {
                    if (newVal) nextTick(() => initCharts());
                });
                onMounted(() => { if (authUser.value || sharedAccount.value) nextTick(() => initCharts()); });

                return {
                    accounts, currentAccountId, currentAccountName, promptCreateAccount, onAccountSwitch, deleteCurrentAccount,
                    isLoading, dbErrorMsg, connectionState,
                    authLoading, authUser, authError, loginEmail, loginSentEmail, loginCode, loginError, loginSending,
                    sendCode, verifyCode, logout,
                    records, form, selectedYearMonth, currentYear, calendarWeeks, monthlySummary, stats, viewMode, tableTab, searchQuery,
                    currentPage, totalPages, paginatedRecords, selectedIds, isCurrentPageAllSelected, filterRecords,
                    addRecord, deleteSingle, deleteSelected, toggleSelectAllPage, prevMonth, nextMonth, formatCurrency, exportData, importData,
                    setShortcutDate, setLastFriday, getCalendarDayBg, toggleViewMode, getYearViewWeeks, getYearViewMonthStats, drillDownToMonth,
                    toggleSort, renderSortIcon, selectedDayDetail, openDayDetail, closeDayDetail, dayDetailPnl,
                    currentAccount, shareUrl, shareBusy, shareLinkVisible, shareCurrentAccount, revokeShare, copyShareLink,
                    isShareView, readOnly, sharedLoading, sharedError, sharedAccount, sharedRecords,
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
