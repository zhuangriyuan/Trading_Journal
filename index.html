                // Local-only device preference: which account is selected on THIS device.
                // Accounts and records themselves live in InstantDB and sync everywhere.
                const currentAccountId = ref(localStorage.getItem('trading_journal_current_account_id') || null);

                const accounts = ref([]);      // [{ id, name, ownerId, createdAt }]
                const allRecords = ref([]);    // [{ id, type, date, ticker, amount, accountId, ownerId, createdAt }]
                const allDayNotes = ref([]);   // [{ id, accountId, ownerId, date, content (HTML), updatedAt, shareToken }]
                const userSettingsId = ref(null); // id of this user's row in the userSettings table, if any
                let defaultAccountCreationAttempted = false;
                let unsubscribeDataQuery = null;

                db.subscribeConnectionStatus((status) => {
                    const map = { connecting: 'connecting', opened: 'connecting', authenticated: 'connected', closed: 'closed', errored: 'errored' };
                    connectionState.value = map[status] || 'connecting';
                });

                const startDataSubscription = () => {
                    if (unsubscribeDataQuery) { unsubscribeDataQuery(); }
                    unsubscribeDataQuery = db.subscribeQuery({ accounts: {}, records: {}, dayNotes: {}, userSettings: {} }, (resp) => {
                        isLoading.value = false;
                        if (resp.error) {
                            dbErrorMsg.value = resp.error.message;
                            return;
                        }
                        dbErrorMsg.value = null;
                        accounts.value = (resp.data.accounts || []).slice().sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0));
                        allRecords.value = resp.data.records || [];
                        allDayNotes.value = resp.data.dayNotes || [];

                        const settingsRow = (resp.data.userSettings || [])[0];
                        if (settingsRow) {
                            userSettingsId.value = settingsRow.id;
                            // Cloud value wins once loaded, but don't stomp on a key the
                            // person is actively typing into the "set up" box.
                            if (settingsRow.imgbbApiKey && !imgbbApiKeyPromptOpen.value) {
                                imgbbApiKey.value = settingsRow.imgbbApiKey;
                                imgbbApiKeyInput.value = settingsRow.imgbbApiKey;
                            }
                            if (settingsRow.tradingRules) {
                                try {
                                    const parsed = JSON.parse(settingsRow.tradingRules);
                                    tradingRules.value = Array.isArray(parsed) ? parsed : [];
                                } catch (e) { /* leave as-is if malformed */ }
                            }
                        }

                        if (accounts.value.length === 0) {
                            // First run for this user: create a default account automatically.
                            if (!defaultAccountCreationAttempted) {
                                defaultAccountCreationAttempted = true;
                                const newId = instantId();
                                db.transact(db.tx.accounts[newId].update({ name: '默认账户', ownerId: authUser.value.id, createdAt: Date.now() }));
                            }
                        } else if (!currentAccountId.value || !accounts.value.find(a => a.id === currentAccountId.value)) {
                            currentAccountId.value = accounts.value[0].id;
                        }

                        nextTick(() => updateCharts());
                    });
                };

                db.subscribeAuth((auth) => {
                    authLoading.value = auth.isLoading;
                    authUser.value = auth.user || null;
                    authError.value = auth.error ? auth.error.message : null;

                    if (auth.user) {
                        defaultAccountCreationAttempted = false;
                        startDataSubscription();
                    } else if (unsubscribeDataQuery) {
                        unsubscribeDataQuery();
                        unsubscribeDataQuery = null;
                        accounts.value = [];
                        allRecords.value = [];
                        allDayNotes.value = [];
                        userSettingsId.value = null;
                        isLoading.value = true;
                    }
                });

                // --- Read-only sharing ("?share=TOKEN" in the URL) ---
                // Anyone with this link can view the account, but NOT edit it. See the
                // permission rules note near the bottom of this file / in the chat for
                // the InstantDB dashboard config this depends on.
                const urlShareToken = new URLSearchParams(window.location.search).get('share');
                const isShareView = ref(!!urlShareToken);
                const sharedLoading = ref(true);
                const sharedError = ref(null);
                const sharedAccount = ref(null);
                const sharedRecords = ref([]);
                const sharedDayNotes = ref([]);

                if (urlShareToken) {
                    db.subscribeQuery(
                        {
                            accounts: { $: { where: { shareToken: urlShareToken } } },
                            records: { $: { where: { shareToken: urlShareToken } } },
                            dayNotes: { $: { where: { shareToken: urlShareToken } } },
                        },
                        (resp) => {
                            sharedLoading.value = false;
                            if (resp.error) { sharedError.value = resp.error.message; return; }
                            sharedAccount.value = (resp.data.accounts && resp.data.accounts[0]) || null;
                            sharedRecords.value = (resp.data.records || []).slice().sort((a, b) => {
                                if (a.date !== b.date) return a.date < b.date ? 1 : -1;
                                return (b.createdAt || 0) - (a.createdAt || 0);
                            });
                            sharedDayNotes.value = resp.data.dayNotes || [];
                        },
                        { ruleParams: { shareToken: urlShareToken } }
                    );
                }


                const sendCode = async () => {
                    if (!loginEmail.value) return;
                    loginSending.value = true; loginError.value = null;
                    try {
                        await db.auth.sendMagicCode({ email: loginEmail.value });
                        loginSentEmail.value = loginEmail.value;
                    } catch (err) {
                        loginError.value = (err && err.body && err.body.message) || '发送失败，请检查邮箱地址';
                    } finally {
                        loginSending.value = false;
                    }
                };

                const verifyCode = async () => {
                    if (!loginCode.value) return;
                    loginSending.value = true; loginError.value = null;
                    try {
                        await db.auth.signInWithMagicCode({ email: loginSentEmail.value, code: loginCode.value });
                        loginEmail.value = ''; loginCode.value = ''; loginSentEmail.value = '';
                    } catch (err) {
                        loginError.value = (err && err.body && err.body.message) || '验证码错误，请重试';
                    } finally {
                        loginSending.value = false;
                    }
                };

                const logout = () => { db.auth.signOut(); };

                // "records" mirrors the original app's shape: the flat array of records
                // belonging to the currently selected account. Everything below this
                // point (stats, calendar, charts) reads from `records.value` exactly
                // like the original localStorage version did.
                // Unified data source: in the normal app this is the current account's
                // records; in the read-only shared view (?share=TOKEN) it's the publicly
                // queried records for the shared account. Every stat/calendar/chart below
                // reads from this one computed, so the shared view automatically renders
                // an identical dashboard without duplicating any of that logic.
                const records = computed(() => {
                    if (isShareView.value) return sharedRecords.value;
                    return allRecords.value.filter(r => r.accountId === currentAccountId.value);
                });

                // Same unified-source pattern as `records` above, for per-day notes.
                const dayNotesForAccount = computed(() => {
                    if (isShareView.value) return sharedDayNotes.value;
                    return allDayNotes.value.filter(n => n.accountId === currentAccountId.value);
                });

                const readOnly = computed(() => isShareView.value);

                const currentAccount = computed(() => {
                    if (isShareView.value) return sharedAccount.value;
                    return accounts.value.find(a => a.id === currentAccountId.value) || null;
                });
                const shareUrl = computed(() => {
                    if (!currentAccount.value || !currentAccount.value.shareToken) return '';
                    return `${window.location.origin}${window.location.pathname}?share=${currentAccount.value.shareToken}`;
                });

                const shareBusy = ref(false);
                const shareLinkVisible = ref(false);

                const generateShareToken = () => 'sh_' + Math.random().toString(36).slice(2) + Date.now().toString(36);

                // Turns on (or refreshes) the read-only link for the current account.
                // The token is stamped onto the account AND onto every one of its records,
                // because the InstantDB permission rules check `data.shareToken` directly
                // on each record (no schema links required — see the rules snippet).
                const shareCurrentAccount = async () => {
                    const acc = currentAccount.value;
                    if (!acc) return;
                    shareBusy.value = true;
                    try {
                        const token = acc.shareToken || generateShareToken();
                        const txs = [db.tx.accounts[acc.id].update({ shareToken: token })];
                        allRecords.value.filter(r => r.accountId === acc.id).forEach(r => {
                            txs.push(db.tx.records[r.id].update({ shareToken: token }));
                        });
                        await db.transact(txs);
                        shareLinkVisible.value = true;
                    } finally {
                        shareBusy.value = false;
                    }
                };

                const revokeShare = async () => {
                    const acc = currentAccount.value;
                    if (!acc || !acc.shareToken) return;
                    if (!confirm('确定要取消分享吗？之前发出的只读链接将立即失效。')) return;
                    shareBusy.value = true;
                    try {
                        const txs = [db.tx.accounts[acc.id].update({ shareToken: null })];
                        allRecords.value.filter(r => r.accountId === acc.id).forEach(r => {
                            txs.push(db.tx.records[r.id].update({ shareToken: null }));
                        });
                        await db.transact(txs);
                    } finally {
                        shareBusy.value = false;
                    }
                };

                const copyShareLink = async () => {
                    if (!shareUrl.value) return;
                    try {
                        await navigator.clipboard.writeText(shareUrl.value);
                        alert('只读链接已复制！对方打开后可查看，但无法修改。');
                    } catch (e) {
                        prompt('复制失败，请手动复制以下链接：', shareUrl.value);
                    }
                };

                // Format a Date using its LOCAL calendar date (not UTC). Using
                // .toISOString() here would shift the date near midnight for any
                // timezone behind UTC (e.g. it could show "tomorrow" in the evening).
                const toLocalDateStr = (d) => {
                    const y = d.getFullYear();
                    const m = String(d.getMonth() + 1).padStart(2, '0');
                    const day = String(d.getDate()).padStart(2, '0');
                    return `${y}-${m}-${day}`;
                };

                const form = ref({ type: 'trade', date: toLocalDateStr(new Date()), ticker: '', amount: null, shares: null, direction: '', entryPrice: null, takeProfitPrice: null, stopLossPrice: null, grade: '' });
                const replayMode = ref(false);
                const replayTicker = ref('');

                const toggleReplayMode = () => {
                    replayMode.value = !replayMode.value;
                    if (!replayMode.value) {
                        // Leaving replay mode: unlock and clear the sticky ticker.
                        replayTicker.value = '';
                        if (form.value.type === 'trade') form.value.ticker = '';
                    }
                };

                const unlockReplayTicker = () => {
                    // Stay in replay mode, but let the next saved trade set a new
                    // sticky ticker instead of the current one.
                    replayTicker.value = '';
                    form.value.ticker = '';
                };

                const switchFormType = (type) => {
                    formError.value = '';
                    // The ticker field is shared between the trade form (股票代码) and
                    // the deposit form (渠道/备注) — don't let a replay-locked ticker
                    // leak into the deposit field, and restore it when switching back.
                    if (type === 'deposit' && form.value.type === 'trade') {
                        form.value.ticker = '';
                    } else if (type === 'trade' && replayMode.value && replayTicker.value) {
                        form.value.ticker = replayTicker.value;
                    }
                    form.value.type = type;
                };
                const formError = ref('');
                const viewMode = ref('month');
                const tableTab = ref('trade'); 
                const searchQuery = ref('');
                const dateFilter = ref('');
                const gradeStatsPeriod = ref('month');

                const sortKey = ref('seq'); 
                const sortOrder = ref('desc');     

                const initDate = new Date();
                const selectedYearMonth = ref(`${initDate.getFullYear()}-${String(initDate.getMonth() + 1).padStart(2, '0')}`);
                const currentYear = ref(initDate.getFullYear());
                const currentMonth = computed(() => parseInt(selectedYearMonth.value.split('-')[1]) - 1);

                watch(selectedYearMonth, (newVal) => { if (newVal) { currentYear.value = parseInt(newVal.split('-')[0]); } });
                watch([tableTab, searchQuery, dateFilter], () => { currentPage.value = 1; });

                const currentPage = ref(1);
                const pageSize = 10;
                const selectedIds = ref([]);

                let dailyBarChart = null;
                let cumLineChart = null;
                let depositBarChart = null;

                // Whenever the current account's records change (from any device), refresh charts.
                watch(records, () => {
                    selectedIds.value = [];
                    nextTick(() => updateCharts());
                });

                // Reset UI state whenever the selected account changes, and remember the
                // choice locally (this is a per-device preference, not synced data).
                watch(currentAccountId, (newVal) => {
                    if (newVal) localStorage.setItem('trading_journal_current_account_id', newVal);
                    searchQuery.value = '';
                    currentPage.value = 1;
                    selectedIds.value = [];
                    nextTick(() => updateCharts());
                });

                // 核心多账户控制逻辑 (writes go to InstantDB and sync to every device)
                const promptCreateAccount = () => {
                    const name = prompt("请输入新账户的名称 (例如: 账户B, 美股期权账户):");
                    if (!name || name.trim() === "") return;
                    const cleanedName = name.trim();
                    if (accounts.value.some(a => a.name === cleanedName)) {
                        alert("该账户名称已存在！");
                        return;
                    }
                    const newId = instantId();
                    db.transact(db.tx.accounts[newId].update({ name: cleanedName, ownerId: authUser.value.id, createdAt: Date.now() }));
                    currentAccountId.value = newId;
                };

                const onAccountSwitch = () => { /* currentAccountId already updated via v-model; watcher above handles the rest */ };

                const renameCurrentAccount = () => {
                    const acc = currentAccount.value;
                    if (!acc) return;
                    const name = prompt("请输入新的账户名称:", acc.name);
                    if (name === null) return; // cancelled
                    const cleanedName = name.trim();
                    if (!cleanedName) {
                        alert("账户名称不能为空。");
                        return;
                    }
                    if (cleanedName === acc.name) return; // no change
                    if (accounts.value.some(a => a.id !== acc.id && a.name === cleanedName)) {
                        alert("该账户名称已存在！");
                        return;
                    }
                    db.transact(db.tx.accounts[acc.id].update({ name: cleanedName }));
                };

                const deleteCurrentAccount = () => {
                    if (accounts.value.length <= 1) {
                        alert("系统中必须保留至少一个账户，无法删除唯一的账户。");
                        return;
                    }
                    const acc = accounts.value.find(a => a.id === currentAccountId.value);
                    if (!acc) return;
                    if (confirm(`⚠️ 危险操作！\n确定要彻底删除账户「${acc.name}」及其内部所有的交易与入金数据吗？此操作不可逆！`)) {
                        const txs = allRecords.value
                            .filter(r => r.accountId === currentAccountId.value)
                            .map(r => db.tx.records[r.id].delete());
                        txs.push(db.tx.accounts[currentAccountId.value].delete());
                        db.transact(txs);

                        const remaining = accounts.value.filter(a => a.id !== currentAccountId.value);
                        currentAccountId.value = remaining.length ? remaining[0].id : null;
                    }
                };

                // Stable display numbering for the current account's records, independent
                // of table sort order (chronological by date, then by creation time).
                const recordSeqMap = computed(() => {
                    const sorted = [...records.value].sort((a, b) => {
                        if (a.date !== b.date) return a.date < b.date ? -1 : 1;
                        return (a.createdAt || 0) - (b.createdAt || 0);
                    });
                    const map = {};
                    sorted.forEach((r, idx) => { map[r.id] = idx + 1; });
                    return map;
                });

                const filterRecords = (type) => {
                    return records.value.filter(r => r.type === type).map(r => ({ ...r, seq: recordSeqMap.value[r.id] }));
                };

                const toggleSort = (key) => {
                    if (sortKey.value === key) {
                        sortOrder.value = sortOrder.value === 'asc' ? 'desc' : 'asc';
                    } else {
                        sortKey.value = key;
                        sortOrder.value = 'desc'; 
                    }
                };

                const renderSortIcon = (key) => {
                    if (sortKey.value !== key) return '↕';
                    return sortOrder.value === 'asc' ? '▲' : '▼';
                };

                const processedRecords = computed(() => {
                    let items = filterRecords(tableTab.value);
                    if (dateFilter.value) {
                        items = items.filter(item => item.date === dateFilter.value);
                    }
                    const q = searchQuery.value.trim().toUpperCase();
                    if (q) {
                        items = items.filter(item => 
                            item.date.includes(q) || 
                            (item.ticker && item.ticker.toUpperCase().includes(q))
                        );
                    }
                    items.sort((a, b) => {
                        let valA = a[sortKey.value];
                        let valB = b[sortKey.value];
                        if (typeof valA === 'string') {
                            return sortOrder.value === 'asc' ? valA.localeCompare(valB) : valB.localeCompare(valA);
                        } else {
                            return sortOrder.value === 'asc' ? valA - valB : valB - valA;
                        }
                    });
                    return items;
                });

                const addRecord = () => {
                    formError.value = '';
                    if (!currentAccountId.value) return;

                    if (!form.value.date) {
                        formError.value = '请选择日期';
                        return;
                    }
                    const tickerTrimmed = (form.value.ticker || '').trim();
                    if (!tickerTrimmed) {
                        formError.value = form.value.type === 'trade' ? '请填写股票代码' : '请填写入金渠道 / 备注';
                        return;
                    }
                    if (form.value.amount === null || form.value.amount === '' || isNaN(form.value.amount)) {
                        formError.value = form.value.type === 'trade' ? '请填写净盈亏金额' : '请填写入金金额';
                        return;
                    }

                    const payload = {
                        type: form.value.type,
                        date: form.value.date,
                        ticker: tickerTrimmed.toUpperCase(),
                        amount: parseFloat(form.value.amount),
                        accountId: currentAccountId.value,
                        ownerId: authUser.value.id,
                        createdAt: Date.now(),
                        shareToken: (currentAccount.value && currentAccount.value.shareToken) || null,
                    };

                    if (form.value.type === 'trade') {
                        if (!form.value.direction) {
                            formError.value = '请选择交易方向（做多 / 做空）';
                            return;
                        }
                        payload.direction = form.value.direction;

                        // Optional fields: only include when the user actually filled
                        // them in, so we don't overwrite with 0/null noise.
                        if (form.value.shares !== null && form.value.shares !== '' && !isNaN(form.value.shares)) {
                            payload.shares = parseFloat(form.value.shares);
                        }
                        if (form.value.entryPrice !== null && form.value.entryPrice !== '' && !isNaN(form.value.entryPrice)) {
                            payload.entryPrice = parseFloat(form.value.entryPrice);
                        }
                        if (form.value.takeProfitPrice !== null && form.value.takeProfitPrice !== '' && !isNaN(form.value.takeProfitPrice)) {
                            payload.takeProfitPrice = parseFloat(form.value.takeProfitPrice);
                        }
                        if (form.value.stopLossPrice !== null && form.value.stopLossPrice !== '' && !isNaN(form.value.stopLossPrice)) {
                            payload.stopLossPrice = parseFloat(form.value.stopLossPrice);
                        }
                        if (form.value.grade === 'A' || form.value.grade === 'B' || form.value.grade === 'C') {
                            payload.grade = form.value.grade;
                        }
                    }

                    db.transact(db.tx.records[instantId()].update(payload));

                    if (form.value.type === 'trade' && replayMode.value) {
                        // K线回放模式: lock in this ticker so it carries over to the
                        // next trade automatically instead of resetting to empty.
                        replayTicker.value = tickerTrimmed.toUpperCase();
                        form.value.ticker = replayTicker.value;
                    } else {
                        form.value.ticker = '';
                    }
                    form.value.amount = null;
                    form.value.shares = null;
                    form.value.direction = '';
                    form.value.entryPrice = null;
                    form.value.takeProfitPrice = null;
                    form.value.stopLossPrice = null;
                    form.value.grade = '';
                };

                const setShortcutDate = (daysAgo) => {
                    const d = new Date();
                    d.setDate(d.getDate() - daysAgo);
                    form.value.date = toLocalDateStr(d);
                };

                const setLastFriday = () => {
                    const d = new Date();
                    const dayOfWeek = d.getDay(); 
                    let diff = dayOfWeek === 6 ? 1 : (dayOfWeek === 0 ? 2 : dayOfWeek + 2);
                    d.setDate(d.getDate() - diff);
                    form.value.date = toLocalDateStr(d);
                };

                const deleteSingle = (recordId) => {
                    if(confirm(`确定删除该条记录吗？`)) { db.transact(db.tx.records[recordId].delete()); }
                };

                const deleteSelected = () => {
                    if(confirm(`确定批量删除已选记录吗？`)) {
                        db.transact(selectedIds.value.map(rid => db.tx.records[rid].delete()));
                        selectedIds.value = [];
                    }
                };

                const totalPages = computed(() => Math.ceil(processedRecords.value.length / pageSize));
                const paginatedRecords = computed(() => {
                    const start = (currentPage.value - 1) * pageSize;
                    return processedRecords.value.slice(start, start + pageSize);
                });

                const isCurrentPageAllSelected = computed(() => {
                    const pageIds = paginatedRecords.value.map(r => r.id);
                    return pageIds.length > 0 && pageIds.every(rid => selectedIds.value.includes(rid));
                });

                const toggleSelectAllPage = (e) => {
                    const pageIds = paginatedRecords.value.map(r => r.id);
                    if (e.target.checked) { selectedIds.value = Array.from(new Set([...selectedIds.value, ...pageIds])); }
                    else { selectedIds.value = selectedIds.value.filter(rid => !pageIds.includes(rid)); }
                };

                const formatCurrency = (val) => {
                    if (val === 0) return '0.00';
                    return (val > 0 ? '+' : '') + val.toFixed(2);
                };

                // Calendar day cells are small, so this keeps the number compact —
                // but always shows full precision (no rounding away small values
                // like 0.03). Font size in the template is sized down on mobile so
                // this can't overflow/break the grid.
                const formatDayPnl = (val) => {
                    return (val > 0 ? '+' : '') + val.toFixed(2);
                };

                // Shared helper: given a list of trade records, compute win%, profit factor,
                // and avg win/loss for that slice. Used for global/day/week/month breakdowns.
                const computeTradeStats = (tList) => {
                    const totalTrades = tList.length;
                    const winningTrades = tList.filter(t => t.amount > 0).length;
                    const winPct = totalTrades ? ((winningTrades / totalTrades) * 100).toFixed(1) : '0.0';

                    const grossProfit = tList.filter(t => t.amount > 0).reduce((acc, t) => acc + t.amount, 0);
                    const grossLoss = Math.abs(tList.filter(t => t.amount < 0).reduce((acc, t) => acc + t.amount, 0));
                    const profitFactor = grossLoss === 0 ? (grossProfit ? 'inf' : '0.00') : (grossProfit / grossLoss).toFixed(2);

                    const winTrades = tList.filter(t => t.amount > 0);
                    const lossTrades = tList.filter(t => t.amount < 0);
                    const avgWin = winTrades.length ? (winTrades.reduce((acc, t) => acc + t.amount, 0) / winTrades.length) : 0;
                    const avgLoss = lossTrades.length ? (lossTrades.reduce((acc, t) => acc + t.amount, 0) / lossTrades.length) : 0;

                    return { count: totalTrades, winPct, profitFactor, avgWin, avgLoss };
                };

                const stats = computed(() => {
                    const tList = records.value.filter(r => r.type === 'trade');
                    const dList = records.value.filter(r => r.type === 'deposit');
                    
                    const netPnL = tList.reduce((acc, t) => acc + t.amount, 0);
                    const totalDeposites = dList.reduce((acc, d) => acc + d.amount, 0);

                    // "Day/Week/Month" here follow the date currently selected in the entry
                    // form, same convention as the original Win% breakdown.
                    const targetDateStr = form.value.date;
                    const todayTrades = tList.filter(t => t.date === targetDateStr);

                    const targetDate = new Date(targetDateStr + 'T00:00:00');
                    const dayOfWeek = targetDate.getDay();
                    const startOfWeek = new Date(targetDate); startOfWeek.setDate(targetDate.getDate() - dayOfWeek);
                    const endOfWeek = new Date(targetDate); endOfWeek.setDate(targetDate.getDate() + (6 - dayOfWeek));
                    const startOfWeekStr = toLocalDateStr(startOfWeek);
                    const endOfWeekStr = toLocalDateStr(endOfWeek);
                    const weeklyTrades = tList.filter(t => t.date >= startOfWeekStr && t.date <= endOfWeekStr);

                    const targetYearMonth = targetDateStr.substring(0, 7);
                    const monthlyTrades = tList.filter(t => t.date.startsWith(targetYearMonth));

                    const global = computeTradeStats(tList);
                    const day = computeTradeStats(todayTrades);
                    const week = computeTradeStats(weeklyTrades);
                    const month = computeTradeStats(monthlyTrades);

                    // Long/short win-rate breakdowns, same four time windows.
                    // Older records may not have `direction` set — they're simply
                    // excluded from both buckets (not counted as long or short).
                    const isLong = t => t.direction === 'long';
                    const isShort = t => t.direction === 'short';
                    const longGlobal = computeTradeStats(tList.filter(isLong));
                    const shortGlobal = computeTradeStats(tList.filter(isShort));
                    const longDay = computeTradeStats(todayTrades.filter(isLong));
                    const shortDay = computeTradeStats(todayTrades.filter(isShort));
                    const longWeek = computeTradeStats(weeklyTrades.filter(isLong));
                    const shortWeek = computeTradeStats(weeklyTrades.filter(isShort));
                    const longMonth = computeTradeStats(monthlyTrades.filter(isLong));
                    const shortMonth = computeTradeStats(monthlyTrades.filter(isShort));

                    // A/B/C entry-grade breakdown: win rate per grade, plus what % of
                    // that period's trades were graded A vs B vs C. Ungraded trades
                    // (older records, or the field left blank) are simply excluded.
                    const gradeStatsFor = (list) => {
                        const total = list.length;
                        const pct = (n) => total ? ((n / total) * 100).toFixed(1) : '0.0';
                        const build = (g) => {
                            const s = computeTradeStats(list.filter(t => t.grade === g));
                            return { winPct: s.winPct, count: s.count, entryPct: pct(s.count), avgWin: s.avgWin, avgLoss: s.avgLoss };
                        };
                        return { A: build('A'), B: build('B'), C: build('C') };
                    };

                    return {
                        netPnL, totalDeposits: totalDeposites,
                        tradeWinPct: global.winPct, dayWinPct: day.winPct, weeklyWinPct: week.winPct, monthlyWinPct: month.winPct,
                        profitFactor: global.profitFactor, dayProfitFactor: day.profitFactor, weeklyProfitFactor: week.profitFactor, monthlyProfitFactor: month.profitFactor,
                        avgWin: global.avgWin, avgLoss: global.avgLoss,
                        dayAvgWin: day.avgWin, dayAvgLoss: day.avgLoss,
                        weeklyAvgWin: week.avgWin, weeklyAvgLoss: week.avgLoss,
                        monthlyAvgWin: month.avgWin, monthlyAvgLoss: month.avgLoss,
                        dayTradeCount: day.count, weeklyTradeCount: week.count, monthlyTradeCount: month.count, globalTradeCount: global.count,
                        longWinPct: longGlobal.winPct, dayLongWinPct: longDay.winPct, weeklyLongWinPct: longWeek.winPct, monthlyLongWinPct: longMonth.winPct,
                        shortWinPct: shortGlobal.winPct, dayShortWinPct: shortDay.winPct, weeklyShortWinPct: shortWeek.winPct, monthlyShortWinPct: shortMonth.winPct,
                        grade: { global: gradeStatsFor(tList), day: gradeStatsFor(todayTrades), week: gradeStatsFor(weeklyTrades), month: gradeStatsFor(monthlyTrades) },
                    };
                });

                const dailyMergedMap = computed(() => {
                    const map = {};
                    records.value.forEach(r => {
                        if (!map[r.date]) { map[r.date] = { pnl: 0, deposit: 0, hasTradeData: false, tickers: [], tradeCount: 0, winCount: 0 }; }
                        if (r.type === 'trade') {
                            map[r.date].pnl += r.amount;
                            map[r.date].hasTradeData = true;
                            map[r.date].tradeCount += 1;
                            if (r.amount > 0) map[r.date].winCount += 1;
                            if (r.ticker && r.ticker !== '-') map[r.date].tickers.push(r.ticker);
                        } else if (r.type === 'deposit') {
                            map[r.date].deposit += r.amount;
                            if (r.ticker) map[r.date].tickers.push(r.ticker);
                        }
                    });
                    Object.keys(map).forEach(d => { map[d].tickers = Array.from(new Set(map[d].tickers)); });
                    return map;
                });

                // Dates that have a non-empty note, for the small indicator dot on calendar cells.
                const noteDatesSet = computed(() => {
                    const set = new Set();
                    dayNotesForAccount.value.forEach(n => {
                        const hasText = n.content && n.content.replace(/<[^>]*>/g, '').trim().length > 0;
                        let hasImages = false;
                        if (n.images) {
                            try { hasImages = JSON.parse(n.images).length > 0; } catch (e) { hasImages = false; }
                        }
                        if (hasText || hasImages) set.add(n.date);
                    });
                    return set;
                });

                const buildWeeksMatrix = (year, monthIdx) => {
                    const blanks = new Date(year, monthIdx, 1).getDay();
                    const daysInMonth = new Date(year, monthIdx + 1, 0).getDate();
                    const cells = [];
                    for (let b = 0; b < blanks; b++) cells.push({ isPlaceholder: true });
                    for (let d = 1; d <= daysInMonth; d++) {
                        const dateStr = `${year}-${String(monthIdx + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                        const dayData = dailyMergedMap.value[dateStr] || { pnl: 0, deposit: 0, hasTradeData: false, tickers: [], tradeCount: 0, winCount: 0 };
                        cells.push({
                            isPlaceholder: false, dayNum: d, dateStr: dateStr, 
                            pnl: dayData.pnl, deposit: dayData.deposit, hasTradeData: dayData.hasTradeData, tickers: dayData.tickers, tradeCount: dayData.tradeCount,
                            winCount: dayData.winCount, winPct: dayData.tradeCount ? (dayData.winCount / dayData.tradeCount * 100) : null,
                            hasNote: noteDatesSet.value.has(dateStr),
                        });
                    }
                    const matrix = [];
                    while (cells.length > 0) {
                        const weekDays = cells.splice(0, 7);
                        while (weekDays.length < 7) weekDays.push({ isPlaceholder: true });
                        let weeklyPnl = 0, weeklyTradeDays = 0, weeklyTradeCount = 0, weeklyWinCount = 0;
                        weekDays.forEach(day => {
                            if (!day.isPlaceholder && day.hasTradeData) {
                                weeklyPnl += day.pnl;
                                weeklyTradeDays++;
                                weeklyTradeCount += day.tradeCount;
                                weeklyWinCount += day.winCount;
                            }
                        });
                        const weeklyWinPct = weeklyTradeCount ? (weeklyWinCount / weeklyTradeCount * 100) : null;
                        matrix.push({ days: weekDays, stats: { pnl: weeklyPnl, tradeDays: weeklyTradeDays, tradeCount: weeklyTradeCount, winPct: weeklyWinPct } });
                    }
                    return matrix;
                };

                const calendarWeeks = computed(() => buildWeeksMatrix(currentYear.value, currentMonth.value));
                const getYearViewWeeks = (monthNum) => buildWeeksMatrix(currentYear.value, monthNum - 1);

                const getYearViewMonthStats = (monthNum) => {
                    let pnl = 0, days = 0, trades = 0, wins = 0;
                    const prefix = `${currentYear.value}-${String(monthNum).padStart(2, '0')}`;
                    Object.keys(dailyMergedMap.value).forEach(d => {
                        if (d.startsWith(prefix) && dailyMergedMap.value[d].hasTradeData) {
                            pnl += dailyMergedMap.value[d].pnl;
                            days++;
                            trades += dailyMergedMap.value[d].tradeCount;
                            wins += dailyMergedMap.value[d].winCount;
                        }
                    });
                    const winPct = trades ? (wins / trades * 100) : null;
                    return { pnl, days, trades, winPct };
                };

                const monthlySummary = computed(() => getYearViewMonthStats(currentMonth.value + 1));
                const toggleViewMode = () => { viewMode.value = viewMode.value === 'month' ? 'year' : 'month'; };
                const drillDownToMonth = (monthNum) => {
                    selectedYearMonth.value = `${currentYear.value}-${String(monthNum).padStart(2, '0')}`;
                    viewMode.value = 'month';
                };

                // --- Day detail modal: click a calendar cell to see every trade that day ---
                const selectedDayDetail = ref(null); // { dateStr, trades: [...], deposits: [...] }
                const noteEditorEl = ref(null);
                const newImageUrlInput = ref('');
                const imageFileInputEl = ref(null);
                const imageUploading = ref(false);
                const imageUploadError = ref('');
                const imgbbApiKey = ref(localStorage.getItem('imgbb_api_key') || '');
                const imgbbApiKeyInput = ref(imgbbApiKey.value);
                const imgbbApiKeyPromptOpen = ref(false);

                const saveImgbbApiKey = () => {
                    const key = imgbbApiKeyInput.value.trim();
                    imgbbApiKey.value = key;
                    localStorage.setItem('imgbb_api_key', key); // instant local fallback, e.g. before InstantDB syncs back
                    if (authUser.value) {
                        const id = userSettingsId.value || instantId();
                        userSettingsId.value = id;
                        db.transact(db.tx.userSettings[id].update({
                            ownerId: authUser.value.id,
                            imgbbApiKey: key,
                            updatedAt: Date.now(),
                        }));
                    }
                    imgbbApiKeyPromptOpen.value = false;
                };

                // --- Trading rules: global per-user checklist, not per-account, not
                // visible in the read-only share view (gated by v-if="!readOnly"). ---
                const tradingRules = ref([]);
                const newRuleInput = ref('');

                const saveTradingRules = () => {
                    if (!authUser.value) return;
                    const id = userSettingsId.value || instantId();
                    userSettingsId.value = id;
                    db.transact(db.tx.userSettings[id].update({
                        ownerId: authUser.value.id,
                        tradingRules: JSON.stringify(tradingRules.value),
                        updatedAt: Date.now(),
                    }));
                };

                const addTradingRule = () => {
                    const text = newRuleInput.value.trim();
                    if (!text) return;
                    tradingRules.value = [...tradingRules.value, text];
                    newRuleInput.value = '';
                    saveTradingRules();
                };

                const removeTradingRule = (idx) => {
                    tradingRules.value = tradingRules.value.filter((_, i) => i !== idx);
                    saveTradingRules();
                };

                const moveTradingRule = (idx, delta) => {
                    const target = idx + delta;
                    if (target < 0 || target >= tradingRules.value.length) return;
                    const updated = [...tradingRules.value];
                    [updated[idx], updated[target]] = [updated[target], updated[idx]];
                    tradingRules.value = updated;
                    saveTradingRules();
                };

                const currentDayNoteId = ref(null); // existing dayNotes row id for this date, if any
                const noteSaveStatus = ref('idle');  // idle | saving | saved
                let noteSaveTimer = null;
                let pendingNoteHtml = null;

                let savedScrollY = 0;
                const lockBodyScroll = () => {
                    savedScrollY = window.scrollY;
                    document.body.style.position = 'fixed';
                    document.body.style.top = `-${savedScrollY}px`;
                    document.body.style.left = '0';
                    document.body.style.right = '0';
                };
                const unlockBodyScroll = () => {
                    document.body.style.position = '';
                    document.body.style.top = '';
                    document.body.style.left = '';
                    document.body.style.right = '';
                    window.scrollTo(0, savedScrollY);
                };

                const openDayDetail = (day) => {
                    if (!day || day.isPlaceholder) return;
                    const dayRecords = records.value.filter(r => r.date === day.dateStr);
                    selectedDayDetail.value = {
                        dateStr: day.dateStr,
                        trades: dayRecords.filter(r => r.type === 'trade'),
                        deposits: dayRecords.filter(r => r.type === 'deposit'),
                    };
                    lockBodyScroll();

                    const existingNote = dayNotesForAccount.value.find(n => n.date === day.dateStr);
                    currentDayNoteId.value = existingNote ? existingNote.id : null;
                    noteSaveStatus.value = 'idle';
                    pendingNoteHtml = null;
                    newImageUrlInput.value = '';
                    imageUploadError.value = '';
                    nextTick(() => {
                        if (noteEditorEl.value) noteEditorEl.value.innerHTML = (existingNote && existingNote.content) || '';
                    });
                };

                const flushPendingNoteSave = () => {
                    if (noteSaveTimer) { clearTimeout(noteSaveTimer); noteSaveTimer = null; }
                    if (pendingNoteHtml === null || readOnly.value) return;
                    const html = pendingNoteHtml;
                    pendingNoteHtml = null;
                    const id = currentDayNoteId.value || instantId();
                    currentDayNoteId.value = id;
                    db.transact(db.tx.dayNotes[id].update({
                        accountId: currentAccountId.value,
                        ownerId: authUser.value.id,
                        date: selectedDayDetail.value.dateStr,
                        content: html,
                        updatedAt: Date.now(),
                        shareToken: (currentAccount.value && currentAccount.value.shareToken) || null,
                    })).then(() => { noteSaveStatus.value = 'saved'; }).catch(() => { noteSaveStatus.value = 'idle'; });
                };

                const onNoteInput = () => {
                    if (!noteEditorEl.value) return;
                    pendingNoteHtml = noteEditorEl.value.innerHTML;
                    noteSaveStatus.value = 'saving';
                    if (noteSaveTimer) clearTimeout(noteSaveTimer);
                    noteSaveTimer = setTimeout(flushPendingNoteSave, 800);
                };

                const applyNoteFormat = (cmd) => {
                    if (!noteEditorEl.value) return;
                    noteEditorEl.value.focus();
                    document.execCommand(cmd, false, null);
                    onNoteInput();
                };

                const closeDayDetail = () => {
                    flushPendingNoteSave();
                    selectedDayDetail.value = null;
                    unlockBodyScroll();
                };
                const dayDetailPnl = (detail) => detail.trades.reduce((acc, t) => acc + t.amount, 0);

                const currentDayNoteContent = computed(() => {
                    if (!selectedDayDetail.value) return '';
                    const note = dayNotesForAccount.value.find(n => n.date === selectedDayDetail.value.dateStr);
                    return (note && note.content) || '';
                });

                const currentDayImages = computed(() => {
                    if (!selectedDayDetail.value) return [];
                    const note = dayNotesForAccount.value.find(n => n.date === selectedDayDetail.value.dateStr);
                    if (!note || !note.images) return [];
                    try {
                        const arr = JSON.parse(note.images);
                        if (!Array.isArray(arr)) return [];
                        // Backward-compat: earlier version stored plain URL strings.
                        return arr.map(item => (typeof item === 'string' ? { url: item, thumb: item } : item));
                    } catch (e) {
                        return [];
                    }
                });

                const saveDayImages = (images) => {
                    if (readOnly.value || !selectedDayDetail.value) return;
                    const id = currentDayNoteId.value || instantId();
                    currentDayNoteId.value = id;
                    db.transact(db.tx.dayNotes[id].update({
                        accountId: currentAccountId.value,
                        ownerId: authUser.value.id,
                        date: selectedDayDetail.value.dateStr,
                        images: JSON.stringify(images),
                        updatedAt: Date.now(),
                        shareToken: (currentAccount.value && currentAccount.value.shareToken) || null,
                    }));
                };

                const addDayImage = () => {
                    const url = newImageUrlInput.value.trim();
                    if (!url) return;
                    if (!/^https?:\/\//i.test(url)) {
                        alert('请粘贴一个完整的图片直链地址（以 http:// 或 https:// 开头）');
                        return;
                    }
                    saveDayImages([...currentDayImages.value, { url, thumb: url }]);
                    newImageUrlInput.value = '';
                };

                const removeDayImage = (idx) => {
                    const img = currentDayImages.value[idx];
                    if (img && img.deleteUrl) {
                        // ImgBB has no official delete API — this delete_url is an
                        // unofficial mechanism that (per their own community reports)
                        // doesn't reliably work when called programmatically via
                        // fetch(). Opening it as a real page lets the person click the
                        // actual delete button themselves, which reliably works.
                        window.open(img.deleteUrl, '_blank', 'noopener,noreferrer');
                    }
                    saveDayImages(currentDayImages.value.filter((_, i) => i !== idx));
                };

                const onDayImageError = (e) => {
                    e.target.alt = '图片加载失败 / 链接可能已失效';
                    e.target.style.opacity = '0.35';
                };

                // Shared upload path for both the file picker and the screenshot
                // capture button below — both end up with a Blob/File to send to ImgBB.
                const uploadImageBlobToImgbb = async (blob, filename) => {
                    imageUploadError.value = '';

                    if (!imgbbApiKey.value) {
                        imageUploadError.value = '还没设置 ImgBB API Key，点上面"⚙️ 需要先设置上传"填一个（免费申请）。';
                        imgbbApiKeyPromptOpen.value = true;
                        return;
                    }
                    if (blob.size > 32 * 1024 * 1024) {
                        imageUploadError.value = '图片太大了（ImgBB 限制单张最大 32MB）。';
                        return;
                    }

                    imageUploading.value = true;
                    try {
                        const formData = new FormData();
                        formData.append('image', blob, filename || 'image.png');
                        const res = await fetch(`https://api.imgbb.com/1/upload?key=${encodeURIComponent(imgbbApiKey.value)}`, {
                            method: 'POST',
                            body: formData,
                        });
                        const json = await res.json();
                        if (!res.ok || !json.success) {
                            throw new Error((json.error && json.error.message) || `HTTP ${res.status}`);
                        }
                        const url = json.data.url || json.data.display_url;
                        const thumb = (json.data.thumb && json.data.thumb.url) || url;
                        const deleteUrl = json.data.delete_url || null;
                        saveDayImages([...currentDayImages.value, { url, thumb, deleteUrl }]);
                    } catch (e) {
                        imageUploadError.value = '上传失败：' + e.message;
                    } finally {
                        imageUploading.value = false;
                    }
                };

                const handleImageFileSelect = async (event) => {
                    const file = event.target.files && event.target.files[0];
                    event.target.value = ''; // allow re-selecting the same file later
                    if (!file) return;
                    if (!file.type.startsWith('image/')) {
                        imageUploadError.value = '请选择图片文件。';
                        return;
                    }
                    await uploadImageBlobToImgbb(file, file.name);
                };

                // Screenshot capture: uses the browser's native Screen Capture API to
                // let the person pick a screen/window/tab, grabs a single frame, then
                // immediately stops sharing (no continuous screen-share session).
                // Requires HTTPS or localhost — browsers block this API on file:// or
                // plain http:// pages for security reasons.
                // --- Screenshot capture + crop ---
                // getDisplayMedia only lets the person pick a whole screen/window/tab
                // (browser security limitation, no API for freeform region capture).
                // So: capture the full frame, then let them drag-select a region in our
                // own UI before uploading — same practical result as a region-select tool.
                const cropModalOpen = ref(false);
                const cropImageUrl = ref('');
                const cropImgEl = ref(null);
                const cropSelection = ref(null); // {x,y,w,h} in on-screen (rendered) pixels
                const cropDragging = ref(false);
                let cropDragStart = { x: 0, y: 0 };
                let capturedCanvas = null; // full-resolution source canvas, kept off-reactive

                const captureScreenshot = async () => {
                    imageUploadError.value = '';

                    if (!navigator.mediaDevices || !navigator.mediaDevices.getDisplayMedia) {
                        imageUploadError.value = '这个浏览器/环境不支持截图功能（需要 HTTPS 或 localhost，file:// 本地文件不支持）。可以用"从相册/电脑上传"或粘贴链接代替。';
                        return;
                    }

                    let stream = null;
                    try {
                        stream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                        const video = document.createElement('video');
                        video.srcObject = stream;
                        await video.play();
                        await new Promise(resolve => {
                            if (video.videoWidth) resolve();
                            else video.onloadedmetadata = () => resolve();
                        });

                        const canvas = document.createElement('canvas');
                        canvas.width = video.videoWidth;
                        canvas.height = video.videoHeight;
                        canvas.getContext('2d').drawImage(video, 0, 0);

                        stream.getTracks().forEach(t => t.stop()); // stop sharing immediately after one frame
                        stream = null;

                        capturedCanvas = canvas;
                        cropImageUrl.value = canvas.toDataURL('image/png');
                        cropSelection.value = null;
                        cropModalOpen.value = true;
                    } catch (e) {
                        if (e.name !== 'NotAllowedError') { // user just cancelled the picker — not an error
                            imageUploadError.value = '截图失败：' + e.message;
                        }
                    } finally {
                        if (stream) stream.getTracks().forEach(t => t.stop());
                    }
                };

                const cropPointerPos = (evt, containerEl) => {
                    const rect = containerEl.getBoundingClientRect();
                    const point = evt.touches ? evt.touches[0] : evt;
                    return {
                        x: Math.min(Math.max(point.clientX - rect.left, 0), rect.width),
                        y: Math.min(Math.max(point.clientY - rect.top, 0), rect.height),
                    };
                };

                const startCropDrag = (evt) => {
                    if (!cropImgEl.value) return;
                    const pos = cropPointerPos(evt, cropImgEl.value);
                    cropDragStart = pos;
                    cropSelection.value = { x: pos.x, y: pos.y, w: 0, h: 0 };
                    cropDragging.value = true;
                };

                const moveCropDrag = (evt) => {
                    if (!cropDragging.value || !cropImgEl.value) return;
                    const pos = cropPointerPos(evt, cropImgEl.value);
                    const x = Math.min(cropDragStart.x, pos.x);
                    const y = Math.min(cropDragStart.y, pos.y);
                    const w = Math.abs(pos.x - cropDragStart.x);
                    const h = Math.abs(pos.y - cropDragStart.y);
                    cropSelection.value = { x, y, w, h };
                };

                const endCropDrag = () => { cropDragging.value = false; };

                const cancelCrop = () => {
                    cropModalOpen.value = false;
                    cropImageUrl.value = '';
                    cropSelection.value = null;
                    capturedCanvas = null;
                };

                const retakeScreenshot = () => {
                    cancelCrop();
                    captureScreenshot();
                };

                // sel = null/too-small means "no real selection" -> upload the whole capture.
                const confirmCrop = async () => {
                    if (!capturedCanvas || !cropImgEl.value) return;
                    const sel = cropSelection.value;
                    const useFullImage = !sel || sel.w < 8 || sel.h < 8;

                    let outputCanvas = capturedCanvas;
                    if (!useFullImage) {
                        const scale = capturedCanvas.width / cropImgEl.value.clientWidth;
                        const sx = sel.x * scale, sy = sel.y * scale, sw = sel.w * scale, sh = sel.h * scale;
                        const cropped = document.createElement('canvas');
                        cropped.width = sw;
                        cropped.height = sh;
                        cropped.getContext('2d').drawImage(capturedCanvas, sx, sy, sw, sh, 0, 0, sw, sh);
                        outputCanvas = cropped;
                    }

                    const blob = await new Promise(resolve => outputCanvas.toBlob(resolve, 'image/png'));
                    cancelCrop();
                    if (!blob) { imageUploadError.value = '截图生成失败'; return; }
                    await uploadImageBlobToImgbb(blob, `screenshot-${Date.now()}.png`);
                };


                const getCalendarDayBg = (day) => {
                    if (!day.hasTradeData) {
                        return day.deposit > 0 ? 'bg-green-950 bg-opacity-20 border-green-900/40 text-gray-400' : 'bg-gray-800 bg-opacity-10 text-gray-600 border-transparent';
                    }
                    if (day.pnl > 0) return 'bg-green-800 bg-opacity-60 border-green-600 text-white';
                    if (day.pnl < 0) return 'bg-red-800 bg-opacity-60 border-red-600 text-white';
                    return 'bg-gray-800 bg-opacity-50 border-gray-700 text-white';
                };

                const prevMonth = () => {
                    let y = currentYear.value; let m = currentMonth.value;
                    if (m === 0) { m = 12; y--; } selectedYearMonth.value = `${y}-${String(m).padStart(2, '0')}`;
                };
                const nextMonth = () => {
                    let y = currentYear.value; let m = currentMonth.value + 2;
                    if (m > 12) { m = 1; y++; } selectedYearMonth.value = `${y}-${String(m).padStart(2, '0')}`;
                };

                const initCharts = () => {
                    const barEl = document.getElementById('dailyBarChart');
                    const lineEl = document.getElementById('cumLineChart');
                    const depEl = document.getElementById('depositBarChart');
                    if (!barEl || !lineEl || !depEl) return; // canvases not mounted yet (e.g. not logged in)

                    // Destroy any previous instances (e.g. after logout/login) before recreating.
                    if (dailyBarChart) { dailyBarChart.destroy(); dailyBarChart = null; }
                    if (cumLineChart) { cumLineChart.destroy(); cumLineChart = null; }
                    if (depositBarChart) { depositBarChart.destroy(); depositBarChart = null; }

                    const ctxBar = barEl.getContext('2d');
                    dailyBarChart = new Chart(ctxBar, {
                        type: 'bar',
                        data: { labels: [], datasets: [{ data: [], backgroundColor: [] }] },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { grid: { display: false }, ticks: { color: '#9ca3af', font: { size: 10 } } }, y: { grid: { color: '#1f2937' }, ticks: { color: '#9ca3af', font: { size: 10 } } } } }
                    });

                    const ctxLine = lineEl.getContext('2d');
                    cumLineChart = new Chart(ctxLine, {
                        type: 'line',
                        data: { labels: [], datasets: [{ label: '交易累计盈亏', data: [], borderColor: '#6366f1', borderWidth: 2, tensor: 0.1, fill: false, pointRadius: 2 }] },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { grid: { display: false }, ticks: { color: '#9ca3af', font: { size: 10 } } }, y: { grid: { color: '#1f2937' }, ticks: { color: '#9ca3af', font: { size: 10 } } } } }
                    });

                    const ctxDep = depEl.getContext('2d');
                    depositBarChart = new Chart(ctxDep, {
                        type: 'bar',
                        data: { labels: [], datasets: [{ data: [], backgroundColor: '#10b981' }] },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { grid: { display: false }, ticks: { color: '#9ca3af', font: { size: 10 } } }, y: { grid: { color: '#1f2937' }, ticks: { color: '#9ca3af', font: { size: 10 } } } } }
                    });

                    setTimeout(() => { updateCharts(); }, 100);
                };

                const updateCharts = () => {
                    if (!dailyBarChart || !cumLineChart || !depositBarChart) return;
                    
                    const dayTradeMap = {};
                    const dayDepositMap = {};
                    
                    records.value.forEach(r => {
                        if (r.type === 'trade') dayTradeMap[r.date] = (dayTradeMap[r.date] || 0) + r.amount;
                        if (r.type === 'deposit') dayDepositMap[r.date] = (dayDepositMap[r.date] || 0) + r.amount;
                    });
                    
                    const tradeDatesOnly = Object.keys(dayTradeMap).sort((a,b) => new Date(a) - new Date(b));
                    const dailyBarValues = tradeDatesOnly.map(d => dayTradeMap[d]);
                    dailyBarChart.data.labels = tradeDatesOnly;
                    dailyBarChart.data.datasets[0].data = dailyBarValues;
                    dailyBarChart.data.datasets[0].backgroundColor = dailyBarValues.map(v => v > 0 ? '#10b981' : (v < 0 ? '#f43f5e' : '#9ca3af'));
                    dailyBarChart.update();

                    let cumPnlSum = 0;
                    const pnlLineValues = tradeDatesOnly.map(d => {
                        cumPnlSum += dayTradeMap[d];
                        return cumPnlSum;
                    });
                    cumLineChart.data.labels = tradeDatesOnly;
                    cumLineChart.data.datasets[0].data = pnlLineValues;
                    cumLineChart.update();

                    const depositDatesOnly = Object.keys(dayDepositMap).sort((a,b) => new Date(a) - new Date(b));
                    const dailyDepositValues = depositDatesOnly.map(d => dayDepositMap[d]);
                    depositBarChart.data.labels = depositDatesOnly;
                    depositBarChart.data.datasets[0].data = dailyDepositValues;
                    depositBarChart.update();
                };

                const currentAccountName = computed(() => (currentAccount.value ? currentAccount.value.name : ''));

                const exportData = () => {
                    // 备份仅包含当前账户名和其流水记录（不含内部数据库 id，方便跨库导入）
                    const backupPackage = {
                        accountName: currentAccountName.value,
                        records: records.value.map(r => ({
                            type: r.type, date: r.date, ticker: r.ticker, amount: r.amount,
                            shares: r.shares ?? null, direction: r.direction ?? null,
                            entryPrice: r.entryPrice ?? null, takeProfitPrice: r.takeProfitPrice ?? null, stopLossPrice: r.stopLossPrice ?? null,
                            grade: r.grade ?? null,
                        }))
                    };
                    const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(backupPackage));
                    const downloadAnchor = document.createElement('a');
                    downloadAnchor.setAttribute("href", dataStr);
                    downloadAnchor.setAttribute("download", `journal_${currentAccountName.value}_backup_${toLocalDateStr(new Date())}.json`);
                    document.body.appendChild(downloadAnchor); downloadAnchor.click(); downloadAnchor.remove();
                };

                const importData = (event) => {
                    const file = event.target.files[0]; if (!file) return;
                    const reader = new FileReader();
                    reader.onload = async (e) => {
                        try {
                            const imported = JSON.parse(e.target.result);
                            let recordsToImport = [];
                            let importedAccountName = null;

                            // 兼容旧版本的单数组备份结构与全新的账户包结构
                            if (Array.isArray(imported)) {
                                recordsToImport = imported;
                            } else if (imported && Array.isArray(imported.records)) {
                                recordsToImport = imported.records;
                                importedAccountName = imported.accountName || null;
                            } else {
                                alert("读取文件失败，请检查文件格式是否正确。");
                                return;
                            }

                            let targetAccountId = currentAccountId.value;
                            let targetName = currentAccountName.value;

                            if (importedAccountName) {
                                const existing = accounts.value.find(a => a.name === importedAccountName);
                                if (existing) {
                                    targetAccountId = existing.id;
                                } else {
                                    const newId = instantId();
                                    await db.transact(db.tx.accounts[newId].update({ name: importedAccountName, ownerId: authUser.value.id, createdAt: Date.now() }));
                                    targetAccountId = newId;
                                }
                                targetName = importedAccountName;
                            }

                            const txs = recordsToImport.map(r => db.tx.records[instantId()].update({
                                type: r.type,
                                date: r.date,
                                ticker: r.ticker || '-',
                                amount: parseFloat(r.amount) || 0,
                                accountId: targetAccountId,
                                ownerId: authUser.value.id,
                                createdAt: Date.now(),
                                ...(r.direction ? { direction: r.direction } : {}),
                                ...(r.shares !== undefined && r.shares !== null ? { shares: parseFloat(r.shares) } : {}),
                                ...(r.entryPrice !== undefined && r.entryPrice !== null ? { entryPrice: parseFloat(r.entryPrice) } : {}),
                                ...(r.takeProfitPrice !== undefined && r.takeProfitPrice !== null ? { takeProfitPrice: parseFloat(r.takeProfitPrice) } : {}),
                                ...(r.stopLossPrice !== undefined && r.stopLossPrice !== null ? { stopLossPrice: parseFloat(r.stopLossPrice) } : {}),
                                ...(r.grade ? { grade: r.grade } : {}),
                            }));
                            if (txs.length) await db.transact(txs);

                            currentAccountId.value = targetAccountId;
                            alert(`导入成功！已导入 ${txs.length} 条记录至账户：${targetName}`);
                        } catch (err) {
                            console.error(err);
                            alert("读取文件失败，请检查文件格式是否正确。");
                        }
                    };
                    reader.readAsText(file);
                    event.target.value = '';
                };

                // Canvases only exist in the DOM once logged in (they're inside the v-else
                // block). Initialize charts once authUser becomes truthy, and re-init if the
                // user logs out then back in (canvases get unmounted/remounted by Vue).
                watch(authUser, (newVal) => {
                    if (newVal) nextTick(() => initCharts());
                });
                watch(sharedAccount, (newVal) => {
                    if (newVal) nextTick(() => initCharts());
                });
                onMounted(() => { if (authUser.value || sharedAccount.value) nextTick(() => initCharts()); });

                return {
                    accounts, currentAccountId, currentAccountName, promptCreateAccount, renameCurrentAccount, onAccountSwitch, deleteCurrentAccount,
                    isLoading, dbErrorMsg, connectionState,
                    authLoading, authUser, authError, loginEmail, loginSentEmail, loginCode, loginError, loginSending,
                    sendCode, verifyCode, logout,
                    records, form, formError, selectedYearMonth, currentYear, calendarWeeks, monthlySummary, stats, viewMode, tableTab, searchQuery, dateFilter, gradeStatsPeriod,
                    replayMode, replayTicker, toggleReplayMode, unlockReplayTicker, switchFormType,
                    currentPage, totalPages, paginatedRecords, selectedIds, isCurrentPageAllSelected, filterRecords,
                    addRecord, deleteSingle, deleteSelected, toggleSelectAllPage, prevMonth, nextMonth, formatCurrency, formatDayPnl, exportData, importData,
                    setShortcutDate, setLastFriday, getCalendarDayBg, toggleViewMode, getYearViewWeeks, getYearViewMonthStats, drillDownToMonth,
                    toggleSort, renderSortIcon, selectedDayDetail, openDayDetail, closeDayDetail, dayDetailPnl,
                    noteEditorEl, noteSaveStatus, onNoteInput, applyNoteFormat, currentDayNoteContent,
                    newImageUrlInput, currentDayImages, addDayImage, removeDayImage, onDayImageError,
                    imageFileInputEl, imageUploading, imageUploadError, handleImageFileSelect, captureScreenshot,
                    cropModalOpen, cropImageUrl, cropImgEl, cropSelection, startCropDrag, moveCropDrag, endCropDrag, cancelCrop, retakeScreenshot, confirmCrop,
                    imgbbApiKey, imgbbApiKeyInput, imgbbApiKeyPromptOpen, saveImgbbApiKey,
                    tradingRules, newRuleInput, addTradingRule, removeTradingRule, moveTradingRule,
                    currentAccount, shareUrl, shareBusy, shareLinkVisible, shareCurrentAccount, revokeShare, copyShareLink,
                    isShareView, readOnly, sharedLoading, sharedError, sharedAccount, sharedRecords,
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
